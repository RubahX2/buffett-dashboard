// ── BUFFETT SCORE ─────────────────────────────────────────────────────────────
function bScore(f) {
  if (!f) return 0;
  // ETF's hebben geen fundamentals (pe/roe/marge zijn null). In JS is `null < 15`
  // gelijk aan `true`, dus zonder deze check zou een ETF een ONTERECHTE score krijgen.
  // Geen cijfers = geen oordeel.
  if (f.pe==null && f.roe==null && f.netMargin==null) return null;
  let s = 0;
  if (f.pe > 0 && f.pe < 15) s+=22; else if (f.pe<20) s+=14; else if (f.pe<28) s+=7;
  if (f.roe > 20) s+=20; else if (f.roe>12) s+=10;
  if (f.fcfYield > 5) s+=15; else if (f.fcfYield>2.5) s+=8;
  if (f.debtEquity>=0&&f.debtEquity<0.5) s+=15;
  else if (f.debtEquity<1) s+=8;
  else if (f.debtEquity>2.5) s-=8;
  if (f.netMargin > 20) s+=15; else if (f.netMargin>10) s+=8;
  if (f.revenueGrowth > 10) s+=8; else if (f.revenueGrowth>4) s+=4;
  if (f.divYield > 0) s+=3;
  return Math.min(100, Math.max(0, s));
}

function Ring({ score, size=48 }) {
  // ETF's hebben geen Buffett-score (score is null). Toon een neutrale ring met "ETF"
  // in plaats van een misleidende lege/rode ring.
  if (score==null) {
    const r0=(size/2)-5;
    return (
      <svg width={size} height={size} style={{flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r0} fill="none" stroke={C.border} strokeWidth={5}/>
        <text x="50%" y="50%" textAnchor="middle" dominantBaseline="central"
          style={{fill:C.textDim,fontSize:size<44?9:11,fontWeight:700}}>ETF</text>
      </svg>
    );
  }
  const r=(size/2)-5, circ=2*Math.PI*r, fill=circ*(1-score/100);
  const col=score>=70?C.green:score>=50?C.accent:C.red;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={5}
        strokeDasharray={circ} strokeDashoffset={fill} strokeLinecap="round"/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,
          fill:col,fontSize:size<44?10:13,fontWeight:700}}>{score}</text>
    </svg>
  );
}

function ValuationPanel({ valuation, fund }) {
  if (!valuation) {
    return <div style={{color:C.textDim,textAlign:"center",padding:20}}>

    </div>;
  }
  const v = valuation;
  const colorHex = {green:C.green, neutral:C.textDim, orange:C.orange, red:C.red}[v.verdictColor] || C.text;

  // PEG meter (0 to 4 scale)
  const pegVal = v.peg;
  const pegPos = pegVal != null ? Math.min(pegVal / 4 * 100, 100) : null;

  return (
    <div>
      {/* Verdict hero */}
      <div style={{background:C.bg,borderRadius:8,padding:14,marginBottom:12,
        borderLeft:`3px solid ${colorHex}`}}>
        <div style={{color:C.textDim,fontSize:11,marginBottom:4}}>Waarderingsoordeel</div>
        <div style={{color:colorHex,fontSize:15,fontWeight:700,lineHeight:1.3}}>{v.verdict}</div>
        {v.notes && v.notes.length>0 && (
          <div style={{color:C.muted,fontSize:10,marginTop:6}}>{v.notes.join(" · ")}</div>
        )}
      </div>

      {/* PEG meter */}
      {pegVal != null && (
        <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.textDim,fontSize:11}}>PEG-ratio (P/E ÷ groei)</span>
            <span style={{color:colorHex,fontWeight:700,fontSize:13}}>{pegVal}</span>
          </div>
          <div style={{position:"relative",height:8,background:"#0a0d12",borderRadius:4,overflow:"hidden"}}>
            {/* zones: <1 green, 1-2.5 neutral, >2.5 red */}
            <div style={{position:"absolute",left:0,width:"25%",height:"100%",background:"#14532d",opacity:0.5}}/>
            <div style={{position:"absolute",left:"25%",width:"37.5%",height:"100%",background:"#334155",opacity:0.4}}/>
            <div style={{position:"absolute",left:"62.5%",width:"37.5%",height:"100%",background:"#450a0a",opacity:0.5}}/>
            <div style={{position:"absolute",left:`${pegPos}%`,top:-2,width:2,height:12,background:C.accent}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:8,color:C.muted}}>
            <span>0 goedkoop</span><span>1</span><span>2.5</span><span>4+ duur</span>
          </div>
        </div>
      )}

      {/* P/E percentiel (alleen met echte FMP-data) */}
      {v.pePercentile != null ? (
        <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.textDim,fontSize:11}}>P/E vs eigen historie (5j)</span>
            <span style={{color:v.pePercentile<30?C.green:v.pePercentile>70?C.red:C.text,fontWeight:700,fontSize:13}}>
              {v.pePercentile}ᵉ percentiel
            </span>
          </div>
          <div style={{position:"relative",height:8,background:"#0a0d12",borderRadius:4}}>
            <div style={{position:"absolute",left:`${v.pePercentile}%`,top:-2,width:2,height:12,background:C.accent}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:C.textDim}}>
            <span>Laag: <b style={{color:C.green}}>{v.peMin}x</b></span>
            <span>Mediaan: <b>{v.peMedian}x</b></span>
            <span>Hoog: <b style={{color:C.red}}>{v.peMax}x</b></span>
          </div>
          <div style={{fontSize:9,color:C.muted,marginTop:6}}>Bron: echte historische P/E (FMP)</div>
        </div>
      ) : (
        <div style={{background:C.bg,borderRadius:8,padding:10,marginBottom:10,fontSize:10,color:C.muted}}>
          P/E-percentiel vereist FMP-historie. Nu wordt PEG gebruikt als groei-gecorrigeerde
          waarderingsmaatstaf. (Stel <code style={{color:C.accent}}>FMP_API_KEY</code> in als GitHub Secret voor echte historische P/E.)
        </div>
      )}

      {/* Prijspositie in range */}
      {v.priceRangePosition != null && (
        <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.textDim,fontSize:11}}>Prijspositie in 5-jaars range</span>
            <span style={{color:C.text,fontWeight:700,fontSize:13}}>{v.priceRangePosition}%</span>
          </div>
          <div style={{position:"relative",height:8,background:"linear-gradient(90deg,#14532d,#334155,#450a0a)",borderRadius:4,opacity:0.6}}>
            <div style={{position:"absolute",left:`${v.priceRangePosition}%`,top:-2,width:2,height:12,background:C.accent}}/>
          </div>
          <div style={{fontSize:9,color:C.muted,marginTop:6}}>
            Let op: dit is prijspositie, geen waardering — een aandeel hoog in zijn range kan nog goedkoop zijn als de winst sneller groeide.
          </div>
        </div>
      )}

      {/* Huidige P/E */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        <div style={{background:C.bg,borderRadius:6,padding:"8px 10px"}}>
          <div style={{color:C.textDim,fontSize:10}}>Huidige P/E</div>
          <div style={{color:C.text,fontSize:14,fontWeight:700}}>{v.currentPE!=null?`${v.currentPE}x`:"—"}</div>

        <div style={{background:C.bg,borderRadius:6,padding:"8px 10px"}}>
          <div style={{color:C.textDim,fontSize:10}}>Omzetgroei (YoY)</div>
          <div style={{color:C.text,fontSize:14,fontWeight:700}}>{fund?.revenueGrowth!=null?`${fund.revenueGrowth>=0?"+":""}${fund.revenueGrowth}%`:"—"}</div>
        </div>
      </div>
    </div>
  );
}

function TrackRecord({ track }) {

function MRow({ label, value, good, warn, fmt }) {
  let col = C.text;
  const v = parseFloat(value);
  if (!isNaN(v) && good !== undefined && v <= good) col = C.green;
  if (!isNaN(v) && warn !== undefined && v >= warn) col = C.red;
  const d = value === null || value === undefined ? "—" : fmt ? fmt(value) : String(value);
  return (
    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
      <span style={{color:C.textDim,fontSize:12}}>{label}</span>
      <span style={{color:col,fontSize:12,fontWeight:600}}>{d}</span>
    </div>
  );
}

function FibLevelRows({ entries, currentPrice, cur, accent }) {
  return entries.map((f,i)=>{
    const dist = Math.abs((currentPrice-f.price)/currentPrice*100);
    const isNear = dist < 3, isCurrent = dist < 1.5;
    const inGP = f.gp;
    return (
      <div key={i} style={{
        display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"4px 7px",borderRadius:4,marginBottom:3,
        background:isCurrent?(accent==="green"?"#052e16":"#450a0a"):inGP?"#1c2610":isNear?"#1a1f2e":"transparent",
        border:`1px solid ${isCurrent?(accent==="green"?C.green:C.red):inGP?C.gold||"#a3852f":C.border}`,
      }}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{color:accent==="green"?C.teal:C.orange,fontSize:11,fontWeight:700,minWidth:42}}>{f.label}</span>
          {inGP&&<span style={{fontSize:8,color:C.gold||"#c9a227",fontWeight:700}}>GOLDEN</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {isCurrent&&<span style={{fontSize:9,color:C.accent,fontWeight:700}}>← NU</span>}
          {isNear&&!isCurrent&&<span style={{fontSize:9,color:C.orange}}>{dist.toFixed(1)}%</span>}
          <span style={{color:isNear?C.text:C.textDim,fontSize:12,fontWeight:isNear?700:400}}>{cur}{f.price}</span>
        </div>
      </div>
    );
  });
}

function FibTable({ fib, currentPrice, cur="$" }) {
  if (!fib) return null;
  const { retracements, extensions, goldenPocket, swingLow, swingHigh, extSwingLow, extSwingHigh } = fib;
  const gpLo = goldenPocket?.low, gpHi = goldenPocket?.high;
  // Retracements: hoogste prijs boven (0.000 = top), aflopend naar 1.000 (bodem)
  const retr = Object.entries(retracements||{})
    .map(([k,v])=>({label:k,price:v,gp:(v>=gpLo&&v<=gpHi)}))
    .sort((a,b)=>b.price-a.price);
  // Extensies: hoogste TP boven, aflopend
  const ext = Object.entries(extensions||{})
    .map(([k,v])=>({label:k,price:v,gp:false}))
    .sort((a,b)=>b.price-a.price);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* SET 1 — Retracement / entry */}
      <div style={{background:C.bg,borderRadius:8,padding:12}}>
        <div style={{color:C.teal,fontSize:11,fontWeight:800,marginBottom:2}}>RETRACEMENT · instapzones</div>
        <div style={{fontSize:9,color:C.muted,marginBottom:6}}>
          Swing {cur}{swingLow} → {cur}{swingHigh} (bodem→top, log-schaal) · golden pocket 0.618–0.705 = premium entry
        </div>
        <FibLevelRows entries={retr} currentPrice={currentPrice} cur={cur} accent="green"/>
      </div>
      {/* SET 2 — Extensie / take-profit */}
      <div style={{background:C.bg,borderRadius:8,padding:12}}>
        <div style={{color:C.orange,fontSize:11,fontWeight:800,marginBottom:2}}>EXTENSIE · winstnemingszones</div>
        <div style={{fontSize:9,color:C.muted,marginBottom:6}}>
          Swing {cur}{extSwingHigh ?? swingHigh} → {cur}{extSwingLow ?? swingLow} (top→bodem, chronologisch) · log-schaal, extensies omhoog · 1.618 = kern-TP
        </div>
        <FibLevelRows entries={ext} currentPrice={currentPrice} cur={cur} accent="red"/>
      </div>
    </div>
  );
}

function usePortfolio() {
  const newId = ()=> (typeof crypto!=="undefined"&&crypto.randomUUID)
    ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
  const [p,setP] = useState(()=>{
    try{
      const raw = JSON.parse(localStorage.getItem("bplus_v9")||"[]");
      // Migratie: posities die eerder zonder id zijn opgeslagen krijgen er nu een.
      // Zonder dit zou update()/remove() op bestaande posities niets doen.
      return Array.isArray(raw) ? raw.map(pos=>pos.id?pos:{...pos,id:newId()}) : [];
    }catch{return[]}
  });
  const save = v=>{setP(v);try{localStorage.setItem("bplus_v9",JSON.stringify(v))}catch{}};
  // Sync tussen apparaten: een #sync=... link importeert je gegevens op dít apparaat.
  // Het #-deel van een URL wordt nooit naar een server gestuurd — dit blijft volledig lokaal.
  // De sync neemt zowel je POSITIES als je NOTITIES mee. Nieuw formaat is een pakketje
  // {portfolio:[...], notes:{...}}; een oude link (kale lijst) blijft ook werken.
  useEffect(()=>{
    const m = window.location.hash.match(/^#sync=(.+)$/);
    if(!m) return;
    try{
      const data = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
      let posCount=0, noteCount=0;
      if(Array.isArray(data)&&data.every(x=>x&&x.ticker)){
        // Oud formaat: kale positielijst
        save(data); posCount=data.length;
      } else if(data&&typeof data==="object"&&Array.isArray(data.portfolio)){
        // Nieuw formaat: pakketje met posities + notities
        save(data.portfolio); posCount=data.portfolio.length;
        if(data.notes&&typeof data.notes==="object"){
          try{localStorage.setItem("bplus_notes_v1",JSON.stringify(data.notes));}catch{}
          noteCount=Object.keys(data.notes).length;
        }
      } else {
        throw new Error("onbekend formaat");
      }
      const notePart = noteCount>0 ? ` en ${noteCount} notitie(s)` : "";
      alert(`✓ Gesynchroniseerd: ${posCount} positie(s)${notePart} overgenomen op dit apparaat.`+
            (noteCount>0?" Herlaad de pagina om je notities te zien.":""));
    }catch(e){ alert("Sync-link kon niet gelezen worden."); }
    history.replaceState(null,"",window.location.pathname+window.location.search);
  },[]);
  const syncLink = ()=>{
    // Neem posities én notities mee in het sync-pakketje
    let notesObj={};
    try{notesObj=JSON.parse(localStorage.getItem("bplus_notes_v1")||"{}");}catch{}
    const payload = {portfolio:p, notes:notesObj};
    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const url = window.location.origin + window.location.pathname + "#sync=" + b64;
    const nP=p.length, nN=Object.keys(notesObj).length;
    const summary = `${nP} positie(s)`+(nN>0?` + ${nN} notitie(s)`:"");
    if(navigator.share){ navigator.share({title:"BUFFETT+ sync",text:summary,url}).catch(()=>{}); }
    else if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url); alert(`Sync-link gekopieerd (${summary}) — open hem in Safari op je andere apparaat.`); }
    else { prompt(`Kopieer deze sync-link (${summary}) en open hem op je andere apparaat:`, url); }
  };
  return {
    portfolio:p,
    // Elke positie krijgt een UNIEK id. Zonder dat werd de array-index als identiteit
    // gebruikt -- en die verschuift zodra je een positie verwijdert of de lijst
    // herschikt, waardoor een bewerking op de VERKEERDE positie kon landen (of een
    // bewerking als nieuwe positie werd toegevoegd).
    add:(ticker,shares,buyPrice,date,reason,risk,note)=>save([...p,{
      id: (typeof crypto!=="undefined"&&crypto.randomUUID) ? crypto.randomUUID()
          : `${Date.now()}-${Math.random().toString(36).slice(2,9)}`,
      ticker,shares:+shares,buyPrice:+buyPrice,date,
      reason:reason||"",risk:risk||"",note:note||""}]),
    // Bewerken en verwijderen gaan op ID, NIET op array-index. Een index verschuift
    // zodra de lijst verandert; een id blijft bij de positie horen. Dit was de oorzaak
    // van bewerkingen die als nieuwe positie werden toegevoegd.
    update:(id,fields)=>save(p.map(pos=>pos.id===id?{...pos,...fields}:pos)),
    remove:id=>save(p.filter(pos=>pos.id!==id)),
    syncLink,
  };
}

// Watchlist-notities per aandeel (los van posities): "waar vond ik dit", losse gedachten.
// Bewaard per ticker in een aparte localStorage-sleutel, werkt voor de hele watchlist —
// ook aandelen die je niet bezit.
function useNotes() {
  const [notes,setNotes] = useState(()=>{try{return JSON.parse(localStorage.getItem("bplus_notes_v1")||"{}")}catch{return{}}});
  const saveNote = (ticker,text)=>{
    const next = {...notes};
    if(text&&text.trim()) next[ticker]=text; else delete next[ticker];
    setNotes(next);
    try{localStorage.setItem("bplus_notes_v1",JSON.stringify(next))}catch{}
  };
  return { notes, saveNote };
}

  const [pr,setPr]   = useState("");
  const [dt,setDt]   = useState(()=>new Date().toISOString().slice(0,10));
  const [rsn,setRsn] = useState("");
  const [rsk,setRsk] = useState("");
  const [nt,setNt]   = useState("");
  const [openJournal,setOpenJournal] = useState(false);

  // Vul de prijs met de huidige koers zodra die bekend is -- maar alleen als de
  // gebruiker nog niets zelf heeft ingetypt. (De koers is er soms nog niet bij de
  // eerste render; een useState-initialisatie zou dan voor altijd leeg blijven.)
  const touched = useRef(false);
  useEffect(()=>{
    if(!touched.current && last && !pr) setPr(last.toFixed(2));
  },[last]);   // eslint-disable-line react-hooks/exhaustive-deps

  const canSave = sh.trim()!=="" && pr.trim()!=="" && +sh>0 && +pr>0;
  const submit = ()=>{
    if(!canSave) return;
    add(ticker, sh, pr, dt, rsn, rsk, nt);
    setSh(""); setRsn(""); setRsk(""); setNt("");
    setOpenJournal(false);
    touched.current = false;
    if(last) setPr(last.toFixed(2));
  };
  const inp = {width:"100%",background:C.bg,border:`1px solid ${C.border}`,color:C.text,
    borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box"};
  const ta = extra => ({...inp,resize:"vertical",fontFamily:"inherit",background:C.bg,...extra});

  return (
    <div style={{marginBottom:16}}>
      <div style={{color:C.accent,fontSize:13,fontWeight:700,marginBottom:10}}>Positie toevoegen</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Aantal aandelen</div>
          <input value={sh} inputMode="decimal" placeholder="bijv. 10"
            onChange={e=>setSh(e.target.value)} style={inp}/>
        </div>
        <div>
          <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Aankoopprijs ({currency})</div>
          <input value={pr} inputMode="decimal"
            onChange={e=>{touched.current=true; setPr(e.target.value);}} style={inp}/>
        </div>
      </div>
      <div style={{marginBottom:8}}>
        <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Datum</div>
        <input type="date" value={dt} onChange={e=>setDt(e.target.value)}
          style={{...inp,width:"auto"}}/>
      </div>

      {/* Dagboek: ingeklapt tenzij je het nodig hebt */}
      <div style={{borderTop:`1px solid ${C.border}`,margin:"10px 0 8px",paddingTop:8}}>
        {!openJournal ? (
          <button onClick={()=>setOpenJournal(true)}
            style={{background:"transparent",color:C.textDim,border:`1px dashed ${C.border}`,
              borderRadius:5,padding:"6px 12px",fontSize:11,cursor:"pointer",width:"100%",
              textAlign:"left"}}>
            📓 + Beleggingsdagboek toevoegen <span style={{color:C.muted}}>(optioneel — waarom, gevaar, opmerking)</span>
          </button>
        ) : (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{color:C.accent,fontSize:11,fontWeight:700}}>📓 Beleggingsdagboek</span>
              <button onClick={()=>setOpenJournal(false)}
                style={{background:"transparent",color:C.textDim,border:"none",fontSize:11,
                  cursor:"pointer",padding:"2px 6px"}}>▲ inklappen</button>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{color:C.green,fontSize:11,marginBottom:3}}>Waarom kocht ik?</div>
              <textarea value={rsn} onChange={e=>setRsn(e.target.value)} rows={2}
                placeholder="Thesis: moat, koopsignaal, waardering..." style={ta()}/>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{color:C.orange,fontSize:11,marginBottom:3}}>Gevaar — wat kan de thesis breken?</div>
              <textarea value={rsk} onChange={e=>setRsk(e.target.value)} rows={2}
                placeholder="Het risico dat je erkent op dit moment..." style={ta({border:`1px solid ${C.orange}55`})}/>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Bijkomende opmerking</div>
              <textarea value={nt} onChange={e=>setNt(e.target.value)} rows={2}
                placeholder="Optioneel..." style={ta()}/>
            </div>
          </div>
        )}
      </div>

      <button onClick={submit} disabled={!canSave}
        style={{background:canSave?C.accent:C.panel2,color:canSave?C.bg:C.muted,border:"none",
          borderRadius:5,padding:"8px 16px",fontWeight:700,fontSize:12,
          cursor:canSave?"pointer":"not-allowed"}}>
        + Toevoegen
      </button>
      {!canSave&&(sh||pr)&&(
        <span style={{color:C.muted,fontSize:10,marginLeft:8}}>
          Vul aantal én prijs in (groter dan 0)
        </span>
      )}
    </div>
  );
}

// Eén positie met bewerkbaar dagboek. De bewerkknop klapt de drie velden open —
// zo kun je ook posities die je eerder toevoegde alsnog van een dagboek voorzien,
// of je thesis bijstellen als je inzicht verandert.
function PositionCard({ p, last, currency, update }) {
  const [editing,setEditing] = useState(false);
  const [rsn,setRsn] = useState(p.reason||"");
  const [rsk,setRsk] = useState(p.risk||"");
  const [nt,setNt]   = useState(p.note||"");
  const pnl = (last-p.buyPrice)*p.shares;
  const hasJournal = p.reason||p.risk||p.note;

  const saveEdit = ()=>{ update(p.id,{reason:rsn,risk:rsk,note:nt}); setEditing(false); };
  const cancelEdit = ()=>{ setRsn(p.reason||""); setRsk(p.risk||""); setNt(p.note||""); setEditing(false); };

  return (
    <div style={{background:C.bg,borderRadius:6,padding:10,marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:C.text,fontSize:12}}>{p.shares} × {currency}{p.buyPrice}</span>
        <span style={{color:pnl>=0?C.green:C.red,fontWeight:700,fontSize:12}}>
          {pnl>=0?"+":""}{currency}{pnl.toFixed(0)} ({((pnl/(p.buyPrice*p.shares))*100).toFixed(1)}%)
        </span>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2}}>
        <span style={{color:C.textDim,fontSize:10}}>{p.date}</span>
        {!editing&&(
          <button onClick={()=>setEditing(true)}
            style={{background:"transparent",color:hasJournal?C.accent:C.textDim,
              border:`1px solid ${hasJournal?C.accent+"66":C.border}`,borderRadius:4,
              padding:"2px 8px",fontSize:10,cursor:"pointer",fontWeight:600}}>
            {hasJournal?"✎ Dagboek bewerken":"+ Dagboek toevoegen"}
          </button>
        )}
      </div>

      {editing?(
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
          <div style={{color:C.accent,fontSize:11,fontWeight:700,marginBottom:6}}>📓 Beleggingsdagboek</div>
          <div style={{marginBottom:6}}>
            <div style={{color:C.green,fontSize:11,marginBottom:3}}>Waarom kocht ik?</div>
            <textarea value={rsn} onChange={e=>setRsn(e.target.value)}
              placeholder="Thesis: moat, koopsignaal, waardering..." rows={2}
              style={{width:"100%",background:C.panel,border:`1px solid ${C.border}`,color:C.text,
                borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
          <div style={{marginBottom:6}}>
            <div style={{color:C.orange,fontSize:11,marginBottom:3}}>Gevaar — wat kan de thesis breken?</div>
            <textarea value={rsk} onChange={e=>setRsk(e.target.value)}
              placeholder="Het risico dat je erkent op dit moment..." rows={2}
              style={{width:"100%",background:C.panel,border:`1px solid ${C.orange}55`,color:C.text,
                borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Bijkomende opmerking</div>
            <textarea value={nt} onChange={e=>setNt(e.target.value)}
              placeholder="Optioneel..." rows={2}
              style={{width:"100%",background:C.panel,border:`1px solid ${C.border}`,color:C.text,
                borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={saveEdit}
              style={{background:C.accent,color:C.bg,border:"none",borderRadius:5,
                padding:"6px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Opslaan</button>
            <button onClick={cancelEdit}
              style={{background:"transparent",color:C.textDim,border:`1px solid ${C.border}`,
                borderRadius:5,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>Annuleer</button>
          </div>
        </div>
      ):(
        hasJournal&&(
          <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:6}}>
            {p.reason&&<div>
              <div style={{color:C.green,fontSize:10,fontWeight:700,marginBottom:2}}>Waarom gekocht</div>
              <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.reason}</div>
            </div>}
            {p.risk&&<div>
              <div style={{color:C.orange,fontSize:10,fontWeight:700,marginBottom:2}}>⚠ Gevaar</div>
              <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.risk}</div>
            </div>}
            {p.note&&<div>
              <div style={{color:C.textDim,fontSize:10,fontWeight:700,marginBottom:2}}>Opmerking</div>
              <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.note}</div>
            </div>}
          </div>
        )
      )}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const TICKER_ORDER = ["WM","PLTR","CAT","ASML","ASMI","MU","GOOGL","AMZN","ORCL","KO",
  "MSFT","AAPL","NVDA","V","MNST","AON","MELI","SHOP","NET","CRWV","SNAP","NKE","MSTR",
  "NFLX","DIS","BLK","BABA","MTLS","GAW","ADM","III","KPG","DIE","SOF","AIR","ALFEN","LOTB",
  "ANET","HOOD","TSCO","ODFL","HWM","SNDK","NABTESCO","HARMONIC","KEYENCE","FANUC","YASKAWA","SOFTBANK","ROK","TER","ISRG","CGNX","NOVT",
  "LHX","MOGA","TDG","KTOS","RKLB","OPEN","SDGR","BNGO","PL",
  "IONQ","RGTI","QBTS","UBTECH","SYM","SERV","RR",
  "RDDT","NOW","GILD","DDOG","ARCC","ONON","ARCG"];

function App() {
  const [jsonData,  setJsonData]  = useState(null);
  const [trackData, setTrackData] = useState(null);
  const [loadState, setLoadState] = useState("loading"); // loading | ok | error | unconfigured
  const [selected,  setSelected]  = useState(null);
  const [view,      setView]      = useState("allocatie");
  const [search,    setSearch]    = useState("");   // zoekbalk screener
  const [sortBy,    setSortBy]    = useState("action");
  const [sortDir,   setSortDir]   = useState("desc");
  const [filterType,setFilter]    = useState("ALL");
  const { portfolio, add, update, remove, syncLink } = usePortfolio();
  const { notes, saveNote } = useNotes();

  // Cache-busting: voeg timestamp toe aan URL
  useEffect(()=>{
    if (SIGNALS_URL.includes("YOUR-USERNAME")) {
      setLoadState("unconfigured");
      return;
    }
    const t = Date.now();
    fetch(`${SIGNALS_URL}?t=${t}`)
      .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d=>{ setJsonData(d); setLoadState("ok"); })
      .catch(e=>{ console.error(e); setLoadState("error"); });
    // Trackrecord apart ophalen (zelfde map)
    const trackUrl = SIGNALS_URL.replace("signals.json","track_record.json");
    fetch(`${trackUrl}?t=${t}`)
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d) setTrackData(d); })
      .catch(()=>{});
  },[]);

  const stocks = jsonData?.stocks || {};
  const meta   = jsonData?.meta || {};
  const allocation = jsonData?.allocation || null;
  const weekly = jsonData?.weekly || null;
  const baggers = jsonData?.baggers || null;
  const market = jsonData?.market || null;
  const errors = jsonData?.errors || [];

  // Combineer live data met fallback fundamentals
  const getStockData = (ticker) => {
    const live = stocks[ticker];
    if (!live) return null;
    return {
      ...live,
      fund: live.fund || FALLBACK_FUND[ticker] || {},
    };
  };

  // Alle signalen over alle aandelen
  const allBuySignals  = TICKER_ORDER.flatMap(t=>(stocks[t]?.signals||[]).filter(s=>s.type==="BUY").map(s=>({...s,ticker:t})));
  const allSellSignals = TICKER_ORDER.flatMap(t=>(stocks[t]?.signals||[]).filter(s=>s.type==="SELL").map(s=>({...s,ticker:t})));
  const allAlerts      = TICKER_ORDER.flatMap(t=>(stocks[t]?.alerts||[]).map(a=>({...a,ticker:t})));

  const filteredSignals =
    filterType==="BUY"   ? allBuySignals :
    filterType==="SELL"  ? allSellSignals :
    filterType==="WATCH" ? allAlerts :
    [...allBuySignals,...allSellSignals,...allAlerts];

  // Group by ticker
  const grouped = {};
  filteredSignals.forEach(s=>{
    if(!grouped[s.ticker]) grouped[s.ticker]={ticker:s.ticker,items:[]};
    grouped[s.ticker].items.push(s);
  });

  const sorted = [...TICKER_ORDER]
    .filter(t=>stocks[t])
    .filter(t=>{
      // Zoekfilter: match op ticker of bedrijfsnaam (hoofdletterongevoelig)
      if(!search.trim()) return true;
      const q = search.trim().toLowerCase();
      const nm = (STOCK_NAMES[t]||"").toLowerCase();
      return t.toLowerCase().includes(q) || nm.includes(q);
    })
    .sort((a,b)=>{
      const valScore = t => {
        const c = stocks[t]?.valuation?.verdictColor;
        return c==="green"?3:c==="neutral"?2:c==="orange"?1:c==="red"?0:-1;
      };
      // Actie-rang: groepeert op categorie (Koop → Verkoop → Caution → Neutraal),
      // binnen elke groep sterkste eerst. Zo staan actievragers bovenaan.
      const actionRank = t => {
        const o = stocks[t]?.overall || "NEUTRAAL";
        const map = {
          "STERK KOOP": 100, "KOOP": 90, "LICHT KOOP": 80,
          "STERK VERKOOP": 70, "VERKOOP": 60, "LICHT VERKOOP": 50,
          "CAUTION (overextended)": 40,
          "NEUTRAAL": 10,
        };
        return map[o] ?? 10;
      };
      const v = t =>
        sortBy==="action"     ? actionRank(t) :
        sortBy==="composite"  ? (stocks[t]?.scores?.composite ?? -1) :
        sortBy==="timing"     ? (stocks[t]?.scores?.timing ?? -1) :
        sortBy==="opportunity"? (stocks[t]?.scores?.opportunity ?? -1) :
        sortBy==="entry"      ? (stocks[t]?.timing?.entryScore ?? -1) :
        sortBy==="trend"      ? (stocks[t]?.timing?.trendScore ?? -1) :
        sortBy==="buyWeight"  ? (stocks[t]?.buyWeight||0) :
        sortBy==="sellWeight" ? (stocks[t]?.sellWeight||0) :
        sortBy==="valuation"  ? valScore(t) :
        sortBy==="acceleration" ? (stocks[t]?.scores?.acceleration ?? -1) :
        sortBy==="rsi"        ? (stocks[t]?.indicators?.rsiDaily||50) :
        sortBy==="alerts"     ? (stocks[t]?.alerts?.length||0) :
                                (bScore(stocks[t]?.fund||FALLBACK_FUND[t]||{}) ?? -1);
      // Tiebreak binnen actie-groep: hoogste composiet eerst
      const primary = sortDir==="desc"?v(b)-v(a):v(a)-v(b);
      if (sortBy==="action" && primary===0) {
        return (stocks[b]?.scores?.composite ?? 0) - (stocks[a]?.scores?.composite ?? 0);
      }
      return primary;
    });

  // Elke positie heeft een uniek id, dus remove()/update() raken altijd de JUISTE
  // positie -- ook al filtert portItems posities zonder koersdata weg.
  const portItems = portfolio.map(p=>{
    const last = stocks[p.ticker]?.indicators?.last;
    if (!last) return null;
    return{...p,last,cv:last*p.shares,cb:p.buyPrice*p.shares,pnl:(last-p.buyPrice)*p.shares};
  }).filter(Boolean);
  const tv2=portItems.reduce((a,p)=>a+p.cv,0);
  const tc2=portItems.reduce((a,p)=>a+p.cb,0);

  const SBtn=({k,l})=>(
    <button onClick={()=>{if(sortBy===k)setSortDir(d=>d==="desc"?"asc":"desc");else{setSortBy(k);setSortDir("desc")}}}
      style={{background:sortBy===k?C.accent:"none",color:sortBy===k?C.bg:C.textDim,
        border:`1px solid ${sortBy===k?C.accent:C.border}`,borderRadius:4,
        padding:"3px 9px",fontSize:10,cursor:"pointer",fontWeight:sortBy===k?700:400}}>
      {l}{sortBy===k?(sortDir==="desc"?" ↓":" ↑"):""}
    </button>
  );

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Inter',system-ui,sans-serif",color:C.text}}>

      {/* NAV */}
      <div style={{borderBottom:`1px solid ${C.border}`,padding:"12px 18px",
        display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <span style={{color:C.accent,fontWeight:900,fontSize:18,letterSpacing:2}}>BUFFETT+</span>
          <span style={{color:C.textDim,fontSize:11,marginLeft:10}}>Kwaliteit × Timing</span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["allocatie","🎯 Allocatie"],["koopkans","💎 Koopkans"],["baggers","🚀 Baggers"],["signalen","🚦 Signalen"],["screener","📊 Screener"],["sectoren","🗂 Sectoren"],["trackrecord","📈 Trackrecord"],["portfolio","💼 Portfolio"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{
              background:view===v?C.accent:"none",color:view===v?C.bg:C.textDim,
              border:`1px solid ${view===v?C.accent:C.border}`,borderRadius:5,
              padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:view===v?700:400}}>{l}</button>
          ))}
        </div>
      </div>

      {/* STATUS BALK */}
      <div style={{padding:"8px 18px",borderBottom:`1px solid ${C.border}`,
        display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
        <div style={{fontSize:11}}>
          {loadState==="loading"&&<span style={{color:C.orange}}>⟳ Data ophalen van GitHub Pages…</span>}
          {loadState==="ok"&&(
            <span style={{color:C.green}}>
              ✓ Laatste update: {meta.generatedAtHuman||"onbekend"}
              {meta.isFriday&&" · 📅 Vrijdag: weekly signalen geëvalueerd"}
            </span>
          )}
          {loadState==="error"&&(
            <span style={{color:C.red}}>
              ✗ Kan data niet laden — controleer of GitHub Actions al gedraaid heeft
            </span>
          )}
          {loadState==="unconfigured"&&(
            <span style={{color:C.orange}}>
              ⚙ Configuratie nodig: vervang YOUR-USERNAME in de app met je GitHub gebruikersnaam
            </span>

        </div>
        {errors.length>0&&(
          <span style={{color:C.red,fontSize:10}}>⚠ {errors.length} fout(en) bij laatste run</span>
        )}
      </div>

      {/* SETUP INSTRUCTIE (als nog niet geconfigureerd) */}
      {loadState==="unconfigured"&&(
        <div style={{margin:16,padding:16,background:"#1c1206",border:"1px solid #854d0e",borderRadius:8}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:8}}>⚙ Eenmalige setup nodig</div>
          <div style={{color:C.textDim,fontSize:12,lineHeight:1.8}}>
            <b style={{color:C.text}}>Stap 1:</b> Maak een gratis GitHub account op github.com<br/>
            <b style={{color:C.text}}>Stap 2:</b> Maak een nieuwe repository aan: <code style={{color:C.accent}}>buffett-dashboard</code><br/>
            <b style={{color:C.text}}>Stap 3:</b> Upload de bestanden: <code style={{color:C.accent}}>analyze.py</code>, <code style={{color:C.accent}}>requirements.txt</code>, <code style={{color:C.accent}}>signals.json</code>, en de <code style={{color:C.accent}}>.github/workflows/daily.yml</code><br/>
            <b style={{color:C.text}}>Stap 4:</b> Activeer GitHub Pages in de repository settings (branch: main)<br/>
            <b style={{color:C.text}}>Stap 5:</b> Vervang <code style={{color:C.accent}}>YOUR-USERNAME</code> in de eerste regel van deze app met je GitHub gebruikersnaam<br/>
            <b style={{color:C.text}}>Stap 6:</b> Run de workflow handmatig via GitHub → Actions → "Dagelijkse Signaalanalyse" → "Run workflow"
          </div>
        </div>

      {/* ALLOCATIE VIEW */}

          ):(

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                    <div>
                      <div style={{color:C.textDim,fontSize:11,letterSpacing:1}}>AANBEVOLEN DEZE MAAND · {allocation.generatedForMonth}</div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}>
                        <span style={{color:C.accent,fontSize:30,fontWeight:900}}>{allocation.primaryPick.ticker}</span>
                        <span style={{color:C.text,fontSize:14}}>{STOCK_NAMES[allocation.primaryPick.ticker]}</span>

                               :{bg:C.panel2,fg:C.textDim,bd:C.border};
                        return (
                          <span title={`Koopkans ${o.opportunity}/100 — ${o.opportunityLabel}${o.opportunityWarning?"\n\n⚠ "+o.opportunityWarning:""}`}
                            style={{background:c.bg,color:c.fg,border:`1px solid ${c.bd}`,borderRadius:4,
                            padding:"2px 7px",fontSize:10,fontWeight:700}}>
                            💎 {o.opportunity}{o.opportunityWarning?" ⚠":""}
                          </span>
                        );
                      })()}
                      {data?.valuation?.verdictColor&&<ValuationBadge color={data.valuation.verdictColor} compact/>}
                      {/* Trend en instap APART. De samengestelde timing (0.6*trend + 0.4*entry)
                          verbergt het verschil: een aandeel kan een beroerde trend hebben maar
                          toch op een uitstekend instapniveau liggen (bv. NFLX: trend 18, instap 82). */}
                      {data?.timing?.trendScore!=null&&(()=>{
                        const tr=data.timing.trendScore, en=data.timing.entryScore;
                        const trCol = tr>=60?C.green:tr>=40?C.orange:C.red;
                        const enCol = en>=70?C.green:en>=50?C.accent:en>=35?C.orange:C.textDim;
                        return (
                          <span title={`Trend ${tr}/100 (is dit een uptrend?) · Instap ${en}/100 (is NU een goed moment?)`}
                            style={{background:C.panel2,border:`1px solid ${C.border}`,borderRadius:4,
                            padding:"2px 7px",fontSize:10,fontWeight:700,display:"inline-flex",gap:5}}>
                            <span style={{color:trCol}}>📈{tr}</span>
                            <span style={{color:C.muted}}>·</span>
                            <span style={{color:enCol}}>🎪{en}</span>
                          </span>
                        );
                      })()}
                      {data?.scores?.composite!=null&&(
                        <span style={{background:C.panel2,color:C.accent,border:`1px solid ${C.accent}`,
                          borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                          ★ {data.scores.composite}
                        </span>
                      )}
                      {data?.scores?.accelLabel&&data.scores.accelLabel!=="onbekend"&&data.scores.accelLabel!=="Stabiel"&&(()=>{
                        const s=data.scores, ac=s.accelColor;
                        const cmap={green:{bg:"#052e16",fg:"#4ade80",bd:"#166534",ic:"🚀"},
                                    orange:{bg:"#1c1a06",fg:C.orange,bd:"#854d0e",ic:"🐢"},
                                    red:{bg:"#450a0a",fg:C.red,bd:"#991b1b",ic:"🐢"},
                                    gray:{bg:C.panel2,fg:C.textDim,bd:C.border,ic:""}}[ac]||{bg:C.panel2,fg:C.textDim,bd:C.border,ic:""};
                        // Van→naar cijfers + de "x"-verhouding (alleen als betrouwbaar)
                        let detail="";
                        if(s.accelGrowthPrev!=null&&s.accelGrowthNow!=null){
                          detail=` (${s.accelGrowthPrev}%→${s.accelGrowthNow}%${s.accelRatio!=null?`, ${s.accelRatio}x`:""})`;
                        }
                        return (
                          <span title={`Omzetgroei ${s.accelValue>=0?"+":""}${s.accelValue}pp t.o.v. vorig jaar`}
                            style={{background:cmap.bg,color:cmap.fg,border:`1px solid ${cmap.bd}`,
                            borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                            {cmap.ic} {s.accelLabel}{detail}
                          </span>
                        );
                      })()}
                      {data?.conflict&&<span style={{color:C.orange,fontSize:10,alignSelf:"center"}}>⚡ conflict</span>}
                    </div>

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",gap:10}}>
                        {[
                          {l:"RSI-D",v:ind.rsiDaily?.toFixed(0)||"—",c:ind.rsiDaily<30?C.green:ind.rsiDaily>70?C.red:C.text},
                          {l:"RSI-W",v:ind.rsiWeekly?.toFixed(0)||"—",c:ind.rsiWeekly<30?C.green:ind.rsiWeekly>70?C.red:C.text},
                          {l:"P/E",  v:fund.pe?`${(+fund.pe).toFixed(0)}x`:"—",c:fund.pe<20?C.green:fund.pe>45?C.red:C.text},
                        ].map(m=>(
                          <div key={m.l}>
                            <div style={{color:C.textDim,fontSize:9}}>{m.l}</div>
                            <div style={{color:m.c,fontSize:11,fontWeight:600}}>{m.v}</div>
                          </div>
                        ))}
                      </div>
                      <Ring score={score} size={40}/>
                    </div>

                    {portfolio.find(p=>p.ticker===ticker)&&(
                      <div style={{marginTop:8,padding:"3px 6px",background:"#1e3a2f",border:"1px solid #166534",borderRadius:4,fontSize:10,color:"#4ade80"}}>
                        💼 In portfolio
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* SECTOREN VIEW */}
      {view==="sectoren"&&(
        <div style={{padding:"14px 16px"}}>
          <div style={{color:C.textDim,fontSize:12,marginBottom:14,lineHeight:1.5}}>
            Je aandelen per sector, elk gerangschikt op composietscore — de sterkste bovenaan.
            Zo weeg je binnen elke sector af wie er wint. Het getal naast elke sector toont hoeveel aandelen je erin volgt.
          </div>
          {(()=>{
            // Groepeer alle aandelen met data per sector
            const bySector = {};
            [...TICKER_ORDER].filter(t=>stocks[t]).forEach(t=>{
              const sec = stocks[t]?.sector || "Industrie & diversen";
              (bySector[sec] ||= []).push(t);
            });
            // Sorteer sectoren op grootte (grootste eerst), aandelen binnen sector op composiet
            const secOrder = Object.keys(bySector).sort((a,b)=>bySector[b].length-bySector[a].length);
            const compOf = t => stocks[t]?.scores?.composite ?? -1;
            return secOrder.map(sec=>{
              const tickers = bySector[sec].sort((a,b)=>compOf(b)-compOf(a));
              return (
                <div key={sec} style={{marginBottom:22}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,
                    borderBottom:`1px solid ${C.border}`,paddingBottom:6}}>
                    <span style={{color:C.accent,fontSize:15,fontWeight:700}}>{sec}</span>
                    <span style={{background:C.panel2,color:C.textDim,borderRadius:10,
                      padding:"1px 9px",fontSize:11,fontWeight:700}}>{tickers.length}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>
                    {tickers.map((t,idx)=>{
                      const d=stocks[t], ind=d?.indicators||{};
                      const comp=compOf(t);
                      const isWinner=idx===0&&comp>=0;   // hoogste composiet in de sector
                      return (
                        <div key={t} onClick={()=>setSelected(t)}
                          style={{background:C.panel,borderRadius:8,padding:"11px",cursor:"pointer",
                            border:`1px solid ${isWinner?C.accent:C.border}`,
                            borderLeft:`3px solid ${(d?.buyWeight||0)>(d?.sellWeight||0)?C.green:(d?.sellWeight||0)>(d?.buyWeight||0)?C.red:C.border}`,
                            transition:"transform 0.1s,border-color 0.12s"}}
                          onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";}}
                          onMouseLeave={e=>{e.currentTarget.style.transform="";}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:5}}>
                                <span style={{color:C.accent,fontWeight:700,fontSize:14}}>{t}</span>
                                {isWinner&&<span title="Hoogste composietscore in deze sector"
                                  style={{fontSize:10}}>👑</span>}
                              </div>
                              <div style={{color:C.textDim,fontSize:9}}>{STOCK_NAMES[t]}</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{color:C.text,fontWeight:700,fontSize:12}}>
                                {ind.last?`${d?.currency||"$"}${ind.last.toFixed(2)}`:"—"}</div>
                              {d?.overall&&<div style={{marginTop:2}}><OverallBadge signal={d.overall}/></div>}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:5,marginTop:8,alignItems:"center",flexWrap:"wrap"}}>
                            {d?.isETF
                              ? <span title="ETF: geen kwaliteitsscore mogelijk — alleen timing telt"
                                  style={{background:C.panel2,color:C.textDim,border:`1px solid ${C.border}`,
                                  borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>★ n.v.t.</span>
                              : <span style={{background:C.panel2,color:C.accent,border:`1px solid ${C.accent}`,
                                  borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>★ {comp>=0?comp:"—"}</span>}
                            {d?.scores?.accelLabel&&d.scores.accelLabel!=="onbekend"&&d.scores.accelLabel!=="Stabiel"&&(
                              <span style={{color:d.scores.accelColor==="green"?C.green:d.scores.accelColor==="orange"?C.orange:C.textDim,
                                fontSize:9,fontWeight:700}}>
                                {d.scores.accelColor==="green"?"🚀":"🐢"}{d.scores.accelValue>0?"+":""}{d.scores.accelValue}pp</span>
                            )}
                            {d?.isETF&&<span title="ETF - een mandje aandelen. Geen kwaliteitsscore mogelijk; alleen timing telt."
                              style={{background:C.panel2,color:C.accent,border:`1px solid ${C.accent}66`,
                              borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:700}}>ETF</span>}
                            {d?.isBagger&&!d?.isETF&&<span style={{color:C.textDim,fontSize:9}}>bagger</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}

      {/* BAGGERS VIEW */}
      {view==="baggers"&&(
        <div style={{padding:"14px 16px"}}>
          <BaggerTrack baggers={baggers} onSelect={setSelected}/>
        </div>
      )}

      {/* TRACKRECORD VIEW */}
      {view==="trackrecord"&&(
        <div style={{padding:"14px 16px"}}>
          <TrackRecord track={trackData}/>
        </div>
      )}

      {/* PORTFOLIO VIEW */}
      {view==="portfolio"&&(
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[
              {l:"Totale waarde",v:`$${tv2.toFixed(0)}`,c:C.accent},
              {l:"Kostprijs",    v:`$${tc2.toFixed(0)}`,c:C.text},
              {l:"P&L",         v:`${tv2-tc2>=0?"+":""}$${(tv2-tc2).toFixed(0)}`,c:tv2-tc2>=0?C.green:C.red},
            ].map(x=>(
              <div key={x.l} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{color:C.textDim,fontSize:11}}>{x.l}</div>
                <div style={{color:x.c,fontSize:20,fontWeight:800,marginTop:2}}>{x.v}</div>
              </div>
            ))}
          </div>
          {portfolio.some(p=>(stocks[p.ticker]?.currency||"$")!=="$")&&(
            <div style={{color:C.orange,fontSize:10,marginBottom:12}}>
              ⚠ Posities in meerdere valuta's — de totalen hierboven tellen bedragen op zonder omrekening.
            </div>
          )}
          {portfolio.length>0&&(
            <button onClick={syncLink} style={{background:"none",color:C.accent,border:`1px solid ${C.accent}`,
              borderRadius:6,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:16}}>
              📲 Sync naar ander apparaat
            </button>
          )}
          {portItems.length===0
            ?<div style={{textAlign:"center",color:C.textDim,padding:40}}>Nog geen posities. Klik een aandeel → tab "Portfolio".</div>
            :<div style={{display:"grid",gap:8}}>
              {portItems.map(p=>{
                const data=getStockData(p.ticker);
                const hasJournal = p.reason||p.risk||p.note;
                return(
                  <div key={p.id} style={{background:C.panel,border:`1px solid ${C.border}`,
                    borderRadius:8,padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{color:C.accent,fontWeight:700}}>{p.ticker} <span style={{color:C.textDim,fontWeight:400,fontSize:11}}>{STOCK_NAMES[p.ticker]}</span></div>
                        <div style={{color:C.textDim,fontSize:11}}>{p.shares} × ${p.buyPrice} · {p.date}</div>
                        <div style={{color:C.textDim,fontSize:11}}>Huidig: ${p.last?.toFixed(2)||"—"}</div>
                        {data?.overall&&<div style={{marginTop:4}}><OverallBadge signal={data.overall}/></div>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:p.pnl>=0?C.green:C.red,fontWeight:700,fontSize:16}}>{p.pnl>=0?"+":""}${p.pnl.toFixed(0)}</div>
                        <div style={{color:p.pnl>=0?C.green:C.red,fontSize:12}}>{((p.pnl/p.cb)*100).toFixed(1)}%</div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setSelected(p.ticker)}
                          style={{background:"none",border:`1px solid ${hasJournal?C.accent+"66":C.border}`,
                            color:hasJournal?C.accent:C.textDim,borderRadius:4,padding:"3px 8px",
                            fontSize:10,cursor:"pointer",fontWeight:600}}>
                          {hasJournal?"✎ Dagboek":"+ Dagboek"}
                        </button>
                        <button onClick={()=>remove(p.id)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>Verwijder</button>
                      </div>
                    </div>
                    {hasJournal&&(
                      <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:6}}>
                        {p.reason&&<div>
                          <div style={{color:C.green,fontSize:10,fontWeight:700,marginBottom:2}}>Waarom gekocht</div>
                          <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.reason}</div>
                        </div>}
                        {p.risk&&<div>
                          <div style={{color:C.orange,fontSize:10,fontWeight:700,marginBottom:2}}>⚠ Gevaar</div>
                          <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.risk}</div>
                        </div>}
                        {p.note&&<div>
                          <div style={{color:C.textDim,fontSize:10,fontWeight:700,marginBottom:2}}>Opmerking</div>
                          <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.note}</div>
                        </div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          }
        </div>
      )}

      {selected&&(
        <Detail ticker={selected} data={getStockData(selected)}
          onClose={()=>setSelected(null)} portfolio={portfolio} add={add} update={update}
          notes={notes} saveNote={saveNote}/>
      )}

      <div style={{borderTop:`1px solid ${C.border}`,padding:"8px 16px",textAlign:"center",color:C.muted,fontSize:10}}>
        Technische data via yfinance · Fundamentals jun 2026 · Signaalgewichten zijn indicatief · Geen financieel advies
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
(function(){
  try {
    var src = document.getElementById("jsx-source").textContent;
    var out = Babel.transform(src, { presets: ["react"] }).code;
    var s = document.createElement("script");
    s.textContent = out;
    document.body.appendChild(s);
  } catch (e) {
    var msg = (e && e.message) ? e.message : String(e);
    var stack = (e && e.stack) ? e.stack : "";
    document.body.innerHTML = "<pre style=\"color:#f88;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:12px;\">BABEL FOUT:\n" + msg + "\n\n" + stack + "</pre>";
    console.error("Babel transform faalde:", e);
  }
})();
</script>
</body>
</html>
