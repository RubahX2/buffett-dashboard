// ── BUFFETT SCORE ─────────────────────────────────────────────────────────────
function bScore(f) {
  if (!f) return 0;
  let s = 0;
  if (f.pe > 0 && f.pe < 15) s+=22; else if (f.pe<20) s+=14; else if (f.pe<28) s+=7;
  if (f.roe > 20) s+=20; else if (f.roe>12) s+=10;
  if (f.fcfYield > 5) s+=15; else if (f.fcfYield>2.5) s+=8;
  if (f.debtEquity>=0&&f.debtEquity<0.5) s+=15;
  else if (f.debtEquity<1) s+=8;
  else if (f.debtEquity>2.5) s-=8;
  if (f.netMargin > 20) s+=15; else if (f.netMargin>10) s+=8;
  if (f.revenueGrowth > 10) s+=8; else if (f.revenueGrowth>4) s+=4;
  if (f.divYield > 0) s+=3;
  return Math.min(100, Math.max(0, s));
}

function Ring({ score, size=48 }) {
  const r=(size/2)-5, circ=2*Math.PI*r, fill=circ*(1-score/100);
  const col=score>=70?C.green:score>=50?C.accent:C.red;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={5}
        strokeDasharray={circ} strokeDashoffset={fill} strokeLinecap="round"/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,
          fill:col,fontSize:size<44?10:13,fontWeight:700}}>{score}</text>
    </svg>
  );
}

function ScoreBar({ label, score, max=100, hint }) {
  const pct = Math.max(0, Math.min(100, (score/max)*100));
  const col = score>=70?C.green:score>=50?C.accent:score>=35?C.orange:C.red;
  return (
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{color:C.textDim,fontSize:11}}>{label}{hint&&<span style={{color:C.muted,fontSize:9}}> · {hint}</span>}</span>
        <span style={{color:col,fontSize:12,fontWeight:700}}>{score!=null?score:"—"}</span>
      </div>
      <div style={{height:6,background:"#0a0d12",borderRadius:3,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:3,transition:"width 0.3s"}}/>
      </div>
    </div>
  );
}

      </div>

      <ScoreBar label="Trend-score (uptrend?)" score={t.trendScore} hint="hogere TF's wegen zwaarder"/>
      <ScoreBar label="Entry-score (goede instap nu?)" score={t.entryScore} hint="vooral daily"/>

      <div style={{fontSize:11,color:C.textDim,margin:"14px 0 6px",fontWeight:700}}>TREND PER TIMEFRAME</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        {[["Monthly",t.trendMonthly,"45%"],["Weekly",t.trendWeekly,"35%"],["Daily",t.trendDaily,"20%"]].map(([lbl,v,w])=>(
          <div key={lbl} style={{background:C.bg,borderRadius:6,padding:"8px 6px",textAlign:"center"}}>
            <div style={{color:C.muted,fontSize:9}}>{lbl} <span style={{color:C.muted}}>({w})</span></div>
            <div style={{color:tfColor(v),fontSize:16,fontWeight:800}}>{v!=null?v:"—"}</div>
          </div>
        ))}
      </div>
      {!t.hasMonthly&&(
        <div style={{marginTop:8,fontSize:9,color:C.muted}}>Monthly nog niet beschikbaar (te weinig historie) — trend gebaseerd op weekly + daily.</div>
      )}
      <div style={{marginTop:10,fontSize:9,color:C.muted,lineHeight:1.5}}>
        Filosofie: koop kwaliteit in een uptrend die net is teruggevallen. Hoge trend + hoge entry = ideale setup.
        Hoge trend maar lage entry = uptrend maar overbought (wachten op pullback).
      </div>
    </div>
  );
}

function TrackRecord({ track }) {

    );

  const records = track.records || {};
  const recList = Object.values(records);
  const [tab, setTab] = useState("monthly_pick");
  const HORIZONS = track.horizonsWeeks || [1,4,13,26];

  const typeLabel = {monthly_pick:"Maandaanbeveling", strong_signal:"Sterke signalen"};

  const typeRecs = recList.filter(r=>r.type===tab)

      <div style={{background:"#1c1206",border:"1px solid #854d0e",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:11,color:C.orange,lineHeight:1.5}}>
        ⚠️ Observatie-instrument, geen bewijs. Accuraatheid wordt pas getoond vanaf {minObs} afgeronde
        observaties per horizon — daaronder zie je enkel de telling en gemiddelde return. Alles is
        gemeten <b>relatief tot {bench}</b> (beter dan de index, niet "ging de markt omhoog"). Het model
        past nooit zelf gewichten aan; jij trekt de conclusies.
      </div>

      {/* Type toggle */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {["monthly_pick","strong_signal"].map(t=>(

            border:`1px solid ${tab===t?C.accent:C.border}`,borderRadius:5,

      {/* Accuracy grid per horizon */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:16}}>
        {HORIZONS.map(wk=>{
          const e = (acc[tab]||{})[`${wk}w`] || {n:0,status:"geen data"};
          const relColor = e.avgRelativeReturn==null?C.textDim:e.avgRelativeReturn>0?C.green:C.red;
          return (

function MRow({ label, value, good, warn, fmt }) {
  let col = C.text;
  const v = parseFloat(value);
  if (!isNaN(v) && good !== undefined && v <= good) col = C.green;
  if (!isNaN(v) && warn !== undefined && v >= warn) col = C.red;
  const d = value === null || value === undefined ? "—" : fmt ? fmt(value) : String(value);
  return (
    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
      <span style={{color:C.textDim,fontSize:12}}>{label}</span>
      <span style={{color:col,fontSize:12,fontWeight:600}}>{d}</span>
    </div>
  );
}

function FibTable({ fib, currentPrice, cur="$" }) {
  if (!fib) return null;
  const { retracements, extensions, swingLow, swingHigh } = fib;
  const all = [
    ...Object.entries(retracements).map(([k,v])=>({label:k,price:v,type:"retrace",lvl:parseFloat(k)})),
    ...Object.entries(extensions).map(([k,v])=>({label:k,price:v,type:"ext",lvl:parseFloat(k)})),
  ].sort((a,b)=>b.lvl-a.lvl);  // fib-niveau aflopend: extensies boven, 0.000 onderaan

  return (
    <div style={{background:C.bg,borderRadius:8,padding:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:11}}>
        <span style={{color:C.textDim}}>Swing High: <b style={{color:C.red}}>{cur}{swingHigh}</b></span>
        <span style={{color:C.textDim}}>Swing Low: <b style={{color:C.green}}>{cur}{swingLow}</b></span>
      </div>
      <div style={{fontSize:9,color:C.muted,marginBottom:8}}>52-week swing · Golden pocket 0.618–0.705 = premium entry · Extensies = winst nemen</div>
      {all.map((f,i)=>{
        const dist = Math.abs((currentPrice-f.price)/currentPrice*100);
        const isNear = dist < 3;
        const isCurrent = dist < 1.5;
        return (
          <div key={i} style={{
            display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"4px 7px",borderRadius:4,marginBottom:3,
            background:isCurrent?(f.type==="retrace"?"#052e16":"#450a0a"):isNear?"#1a1f2e":"transparent",
            border:`1px solid ${isCurrent?(f.type==="retrace"?C.green:C.red):C.border}`,
          }}>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{color:f.type==="retrace"?C.teal:C.orange,fontSize:11,fontWeight:700,minWidth:38}}>
                {f.label}
              </span>
              <span style={{fontSize:9,color:C.muted}}>{f.type==="retrace"?"steun":"TP"}</span>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {isCurrent&&<span style={{fontSize:9,color:C.accent,fontWeight:700}}>← NU</span>}
              {isNear&&!isCurrent&&<span style={{fontSize:9,color:C.orange}}>{dist.toFixed(1)}%</span>}
              <span style={{color:isNear?C.text:C.textDim,fontSize:12,fontWeight:isNear?700:400}}>{cur}{f.price}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function usePortfolio() {
  const [p,setP] = useState(()=>{try{return JSON.parse(localStorage.getItem("bplus_v9")||"[]")}catch{return[]}});
  const save = v=>{setP(v);try{localStorage.setItem("bplus_v9",JSON.stringify(v))}catch{}};
  // Sync tussen apparaten: een #sync=... link importeert een portfolio op dít apparaat.
  // Het #-deel van een URL wordt nooit naar een server gestuurd — dit blijft volledig lokaal.
  useEffect(()=>{
    const m = window.location.hash.match(/^#sync=(.+)$/);
    if(!m) return;
    try{
      const data = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
      if(Array.isArray(data)&&data.every(x=>x&&x.ticker)){
        save(data);
        alert(`✓ Portfolio gesynchroniseerd: ${data.length} positie(s) overgenomen op dit apparaat.`);
      }
    }catch(e){ alert("Sync-link kon niet gelezen worden."); }
    history.replaceState(null,"",window.location.pathname+window.location.search);
  },[]);
  const syncLink = ()=>{
    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(p))));
    const url = window.location.origin + window.location.pathname + "#sync=" + b64;
    if(navigator.share){ navigator.share({title:"BUFFETT+ portfolio",url}).catch(()=>{}); }
    else if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url); alert("Sync-link gekopieerd — open hem in Safari op je andere apparaat."); }
    else { prompt("Kopieer deze sync-link en open hem op je andere apparaat:", url); }
  };
  return {
    portfolio:p,
    add:(ticker,shares,buyPrice,date)=>save([...p,{ticker,shares:+shares,buyPrice:+buyPrice,date}]),
    remove:i=>save(p.filter((_,j)=>j!==i)),
    syncLink,
  };
}

        {errors.length>0&&(
          <span style={{color:C.red,fontSize:10}}>⚠️ {errors.length} fout(en) bij laatste run</span>
        )}
      </div>

      {/* SETUP INSTRUCTIE (als nog niet geconfigureerd) */}
      {loadState==="unconfigured"&&(
        <div style={{margin:16,padding:16,background:"#1c1206",border:"1px solid #854d0e",borderRadius:8}}>
          <div style={{color:C.accent,fontWeight:700,marginBottom:8}}>⚙️ Eenmalige setup nodig</div>
          <div style={{color:C.textDim,fontSize:12,lineHeight:1.8}}>
            <b style={{color:C.text}}>Stap 1:</b> Maak een gratis GitHub account op github.com<br/>
            <b style={{color:C.text}}>Stap 2:</b> Maak een nieuwe repository aan: <code style={{color:C.accent}}>buffett-dashboard</code><br/>
            <b style={{color:C.text}}>Stap 3:</b> Upload de bestanden: <code style={{color:C.accent}}>analyze.py</code>, <code style={{color:C.accent}}>requirements.txt</code>, <code style={{color:C.accent}}>signals.json</code>, en de <code style={{color:C.accent}}>.github/workflows/daily.yml</code><br/>
            <b style={{color:C.text}}>Stap 4:</b> Activeer GitHub Pages in de repository settings (branch: main)<br/>
            <b style={{color:C.text}}>Stap 5:</b> Vervang <code style={{color:C.accent}}>YOUR-USERNAME</code> in de eerste regel van deze app met je GitHub gebruikersnaam<br/>
            <b style={{color:C.text}}>Stap 6:</b> Run de workflow handmatig via GitHub → Actions → "Dagelijkse Signaalanalyse" → "Run workflow"
          </div>
        </div>
      )}

      {/* ALLOCATIE VIEW */}
      {view==="allocatie"&&(
        <div style={{padding:"14px 16px"}}>
          {loadState==="unconfigured"?(
            <div style={{textAlign:"center",color:C.textDim,padding:30}}>
              Configureer eerst de data-URL (zie instructies boven).
            </div>
          ):!allocation?(
            <div style={{textAlign:"center",color:C.textDim,padding:30}}>
              Nog geen allocatie-aanbeveling. Deze verschijnt na de eerste GitHub Actions run met de nieuwe versie.
            </div>
          ):(
            <>
              <MarketCard market={market}/>
              {/* Primary pick hero */}
              {allocation.primaryPick&&(
                <div style={{background:`linear-gradient(135deg,${C.panel2},${C.panel})`,
                  border:`1px solid ${C.accent}`,borderRadius:12,padding:18,marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                    <div>
                      <div style={{color:C.textDim,fontSize:11,letterSpacing:1}}>AANBEVOLEN DEZE MAAND · {allocation.generatedForMonth}</div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}>
                        <span style={{color:C.accent,fontSize:30,fontWeight:900}}>{allocation.primaryPick.ticker}</span>
                        <span style={{color:C.text,fontSize:14}}>{STOCK_NAMES[allocation.primaryPick.ticker]}</span>
                      </div>
                      <div style={{color:C.text,fontSize:13,marginTop:2}}>
                        {allocation.primaryPick.currency||"$"}{allocation.primaryPick.price?.toFixed(2)}
                      </div>
                    </div>
                    <div style={{textAlign:"center",background:C.bg,borderRadius:10,padding:"10px 16px"}}>
                      <div style={{color:C.textDim,fontSize:10}}>Composiet</div>
                      <div style={{color:C.accent,fontSize:32,fontWeight:900,lineHeight:1}}>{allocation.primaryPick.composite}</div>
                      <div style={{color:C.muted,fontSize:9}}>/ 100</div>
                    </div>
                  </div>
                  {/* Score breakdown */}
                  <div style={{marginTop:14}}>
                    <ScoreBar label="Kwaliteit (Buffett-poort)" score={allocation.primaryPick.quality} hint="30%"/>
                    <ScoreBar label="Waardering (niet te duur)" score={allocation.primaryPick.valuation} hint="30%"/>
                    <ScoreBar label="Timing (multi-timeframe chart)" score={Math.max(0,Math.min(100,(allocation.primaryPick.timing||0)+(allocation.primaryPick.marketAdj||0)))} hint={allocation.primaryPick.marketAdj?`40% · incl. markt ${allocation.primaryPick.marketAdj>0?"+":""}${allocation.primaryPick.marketAdj}`:"40%"}/>
                  </div>
                  {allocation.reasoning&&(
                    <div style={{marginTop:10,padding:"8px 10px",background:C.bg,borderRadius:6,fontSize:11,color:C.textDim,lineHeight:1.5}}>
                      {allocation.reasoning}
                    </div>
                  )}
                  <button onClick={()=>setSelected(allocation.primaryPick.ticker)}
                    style={{marginTop:10,background:C.accent,color:C.bg,border:"none",borderRadius:6,
                      padding:"8px 16px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                    Bekijk volledige analyse →
                  </button>
                </div>
              )}

              {/* Weekly changelog */}
              <WeeklyChangelog weekly={weekly} onSelect={setSelected}/>

              {/* Ranked candidates */}
              <div style={{color:C.textDim,fontSize:11,fontWeight:700,marginBottom:8}}>
                KWALITEITSKANDIDATEN · gerangschikt op composiet
              </div>
              <div style={{display:"grid",gap:6,marginBottom:16}}>
                {allocation.candidates?.map((c,i)=>(
                  <div key={c.ticker} onClick={()=>setSelected(c.ticker)}
                    style={{background:C.panel,border:`1px solid ${i===0?C.accent:C.border}`,borderRadius:8,
                      padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{color:C.muted,fontSize:16,fontWeight:800,minWidth:24}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{color:C.accent,fontWeight:700,fontSize:14}}>{c.ticker}</span>
                        <span style={{color:C.textDim,fontSize:10}}>{STOCK_NAMES[c.ticker]}</span>
                      </div>
                      <div style={{display:"flex",gap:10,marginTop:4,fontSize:10,color:C.textDim,flexWrap:"wrap"}}>
                        <span>K <b style={{color:C.text}}>{c.quality}</b></span>
                        <span>W <b style={{color:C.text}}>{c.valuation}</b></span>
                        <span>T <b style={{color:C.text}}>{c.timing}</b></span>
                        <span style={{color:C.muted}}>{c.timingLabel}</span>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:i===0?C.accent:C.text,fontSize:20,fontWeight:800}}>{c.composite}</div>
                      <div style={{color:C.textDim,fontSize:10}}>{c.price!=null?`${c.currency||"$"}${c.price.toFixed(2)}`:""}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Gate-failed */}
              {allocation.gateFailed?.length>0&&(
                <div>
                  <div style={{color:C.textDim,fontSize:11,fontWeight:700,marginBottom:8}}>
                    BUITEN KWALITEITSPOORT · niet aanbevolen als kernbelegging
                  </div>
                  <div style={{display:"grid",gap:6}}>
                    {allocation.gateFailed.map(c=>(
                      <div key={c.ticker} onClick={()=>setSelected(c.ticker)}
                        style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,
                          padding:"8px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",
                          alignItems:"center",opacity:0.7}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{color:C.textDim,fontWeight:700}}>{c.ticker}</span>
                          <span style={{color:C.red,fontSize:10}}>✗ {(c.fails||[]).join(", ")}</span>
                        </div>
                        <span style={{color:C.muted,fontSize:11}}>{c.price!=null?`${c.currency||"$"}${c.price.toFixed(2)} · `:""}K {c.quality}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Method note */}
              <div style={{marginTop:16,padding:"10px 12px",background:C.panel,borderRadius:8,fontSize:10,color:C.muted,lineHeight:1.6}}>
                <b style={{color:C.textDim}}>Methode:</b> alleen aandelen die de kwaliteitspoort passeren (voldoende ROE, marge, houdbare schuld)
                worden gerangschikt. De composietscore weegt kwaliteit (30%), waardering (30%) en multi-timeframe
                timing (40%). Timing combineert trend (monthly/weekly/daily) met instapkwaliteit (RSI, MACD, Bollinger,
                Fibonacci, volume). {allocation.note} Geen financieel advies.
              </div>
            </>
          )}
        </div>
      )}

      {/* SIGNALEN VIEW */}
      {view==="signalen"&&(
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
            {[
              {l:"🟢 Koop signalen",   v:allBuySignals.length,  c:C.green,  f:"BUY"},
              {l:"🔴 Verkoop signalen", v:allSellSignals.length, c:C.red,    f:"SELL"},
              {l:"⚠️ Nabijheid alerts", v:allAlerts.length,      c:C.orange, f:"WATCH"},
            ].map(x=>(
              <div key={x.l} onClick={()=>setFilter(f=>f===x.f?"ALL":x.f)}
                style={{background:filterType===x.f?C.panel2:C.panel,
                  border:`1px solid ${filterType===x.f?C.accent:C.border}`,
                  borderRadius:8,padding:"10px 12px",cursor:"pointer",transition:"border-color 0.15s"}}>
                <div style={{color:C.textDim,fontSize:10,marginBottom:2}}>{x.l}</div>
                <div style={{color:x.c,fontSize:22,fontWeight:800}}>{x.v}</div>
              </div>
            ))}
          </div>

          {loadState==="ok"&&Object.keys(grouped).length===0&&(
            <div style={{textAlign:"center",color:C.textDim,padding:30}}>
              Geen actieve signalen voor dit filter.
            </div>
          )}

          {loadState!=="unconfigured"&&Object.values(grouped).map(g=>(
            <div key={g.ticker} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:12,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,cursor:"pointer"}}
                onClick={()=>setSelected(g.ticker)}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{color:C.accent,fontWeight:700,fontSize:15}}>{g.ticker}</span>
                  <span style={{color:C.textDim,fontSize:11}}>{STOCK_NAMES[g.ticker]}</span>
                  {stocks[g.ticker]?.indicators?.last!=null&&(
                    <span style={{color:C.text,fontSize:12,fontWeight:700}}>{stocks[g.ticker]?.currency||"$"}{stocks[g.ticker].indicators.last.toFixed(2)}</span>
                  )}
                  {stocks[g.ticker]?.overall&&<OverallBadge signal={stocks[g.ticker].overall}/>}
                  {stocks[g.ticker]?.conflict&&<span style={{color:C.orange,fontSize:10}}>⚠️ Conflict</span>}
                </div>
                <span style={{color:C.textDim,fontSize:11}}>→ details</span>
              </div>
              {g.items.map((s,i)=><SignalCard key={i} sig={s}/>)}
            </div>
          ))}
        </div>
      )}

      {/* SCREENER VIEW */}
      {view==="screener"&&(
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
            <span style={{color:C.textDim,fontSize:10}}>Sorteer:</span>
            {[["composite","Composiet ★"],["timing","Timing ⏱️"],["valuation","Waardering 💰"],["buyWeight","Koop 🟢"],["alerts","Alerts ⚠️"],["score","Buffett"]].map(([k,l])=><SBtn key={k} k={k} l={l}/>)}
          </div>

          {/* Als geen live data: toon alle tickers met fallback fundamentals */}
          {(loadState==="unconfigured"||loadState==="error")&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
              {TICKER_ORDER.map(ticker=>{
                const fund  = FALLBACK_FUND[ticker]||{};
                const score = bScore(fund);
                return(
                  <div key={ticker} onClick={()=>setSelected(ticker)}
                    style={{background:C.panel,borderRadius:8,padding:"13px",cursor:"pointer",
                      border:`1px solid ${C.border}`,transition:"transform 0.1s"}}
                    onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.borderColor=C.accent;}}
                    onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor=C.border;}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <div>
                        <div style={{color:C.accent,fontWeight:700}}>{ticker}</div>
                        <div style={{color:C.textDim,fontSize:10}}>{STOCK_NAMES[ticker]}</div>
                      </div>
                      <Ring score={score} size={40}/>
                    </div>
                    <div style={{color:C.orange,fontSize:10}}>⚠️ Geen live data — klik voor fundamentals</div>
                  </div>
                );
              })}
            </div>
          )}

          {loadState==="ok"&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
              {sorted.map(ticker=>{
                const data  = getStockData(ticker);
                const fund  = data?.fund||FALLBACK_FUND[ticker]||{};
                const ind   = data?.indicators||{};
                const score = bScore(fund);
                return(
                  <div key={ticker} onClick={()=>setSelected(ticker)}
                    style={{background:C.panel,borderRadius:8,padding:"13px",cursor:"pointer",
                      border:`1px solid ${C.border}`,
                      borderLeft:`3px solid ${(data?.buyWeight||0)>(data?.sellWeight||0)?C.green:(data?.sellWeight||0)>(data?.buyWeight||0)?C.red:C.border}`,
                      transition:"transform 0.1s,border-color 0.12s"}}
                    onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.borderColor=C.accent;}}
                    onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor=(data?.buyWeight||0)>(data?.sellWeight||0)?C.green:(data?.sellWeight||0)>(data?.buyWeight||0)?C.red:C.border;}}>

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div>
                        <div style={{color:C.accent,fontWeight:700,fontSize:15}}>{ticker}</div>
                        <div style={{color:C.textDim,fontSize:10}}>{STOCK_NAMES[ticker]}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:C.text,fontWeight:700,fontSize:15}}>{ind.last?`${data?.currency||"$"}${ind.last.toFixed(2)}`:"—"}</div>
                        {data?.overall&&<OverallBadge signal={data.overall}/>}
                      </div>
                    </div>

                    <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{background:"#052e16",color:C.green,border:"1px solid #166534",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                        🟢 {data?.signals?.filter(s=>s.type==="BUY").length||0}
                      </span>
                      <span style={{background:"#450a0a",color:C.red,border:"1px solid #991b1b",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                        🔴 {data?.signals?.filter(s=>s.type==="SELL").length||0}
                      </span>
                      <span style={{background:"#1c1a06",color:C.orange,border:"1px solid #854d0e",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                        ⚠️ {data?.alerts?.length||0}
                      </span>
                      {data?.valuation?.verdictColor&&<ValuationBadge color={data.valuation.verdictColor} compact/>}
                      {data?.scores?.composite!=null&&(
                        <span style={{background:C.panel2,color:C.accent,border:`1px solid ${C.accent}`,
                          borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                          ★ {data.scores.composite}
                        </span>
                      )}
                      {data?.conflict&&<span style={{color:C.orange,fontSize:10,alignSelf:"center"}}>⚡ conflict</span>}
                    </div>

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",gap:10}}>
                        {[
                          {l:"RSI-D",v:ind.rsiDaily?.toFixed(0)||"—",c:ind.rsiDaily<30?C.green:ind.rsiDaily>70?C.red:C.text},
                          {l:"RSI-W",v:ind.rsiWeekly?.toFixed(0)||"—",c:ind.rsiWeekly<30?C.green:ind.rsiWeekly>70?C.red:C.text},
                          {l:"P/E",  v:fund.pe?`${(+fund.pe).toFixed(0)}x`:"—",c:fund.pe<20?C.green:fund.pe>45?C.red:C.text},
                        ].map(m=>(
                          <div key={m.l}>
                            <div style={{color:C.textDim,fontSize:9}}>{m.l}</div>
                            <div style={{color:m.c,fontSize:11,fontWeight:600}}>{m.v}</div>
                          </div>
                        ))}
                      </div>
                      <Ring score={score} size={40}/>
                    </div>

                    {portfolio.find(p=>p.ticker===ticker)&&(
                      <div style={{marginTop:8,padding:"3px 6px",background:"#1e3a2f",border:"1px solid #166534",borderRadius:4,fontSize:10,color:"#4ade80"}}>
                        💼 In portfolio
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* BAGGERS VIEW */}
      {view==="baggers"&&(
        <div style={{padding:"14px 16px"}}>
          <BaggerTrack baggers={baggers} onSelect={setSelected}/>
        </div>
      )}

      {/* TRACKRECORD VIEW */}
      {view==="trackrecord"&&(
        <div style={{padding:"14px 16px"}}>
          <TrackRecord track={trackData}/>
        </div>
      )}

      {/* PORTFOLIO VIEW */}
      {view==="portfolio"&&(
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[
              {l:"Totale waarde",v:`$${tv2.toFixed(0)}`,c:C.accent},
              {l:"Kostprijs",    v:`$${tc2.toFixed(0)}`,c:C.text},
              {l:"P&L",         v:`${tv2-tc2>=0?"+":""}$${(tv2-tc2).toFixed(0)}`,c:tv2-tc2>=0?C.green:C.red},
            ].map(x=>(
              <div key={x.l} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{color:C.textDim,fontSize:11}}>{x.l}</div>
                <div style={{color:x.c,fontSize:20,fontWeight:800,marginTop:2}}>{x.v}</div>
              </div>
            ))}
          </div>
          {portfolio.some(p=>(stocks[p.ticker]?.currency||"$")!=="$")&&(
            <div style={{color:C.orange,fontSize:10,marginBottom:12}}>
              ⚠ Posities in meerdere valuta's — de totalen hierboven tellen bedragen op zonder omrekening.
            </div>
          )}
          {portfolio.length>0&&(
            <button onClick={syncLink} style={{background:"none",color:C.accent,border:`1px solid ${C.accent}`,
              borderRadius:6,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:16}}>
              📲 Sync naar ander apparaat
            </button>
          )}
          {portItems.length===0
            ?<div style={{textAlign:"center",color:C.textDim,padding:40}}>Nog geen posities. Klik een aandeel → tab "Portfolio".</div>
            :<div style={{display:"grid",gap:8}}>
              {portItems.map((p,i)=>{
                const data=getStockData(p.ticker);
                return(
                  <div key={i} style={{background:C.panel,border:`1px solid ${C.border}`,
                    borderRadius:8,padding:"12px 14px",display:"flex",
                    justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{color:C.accent,fontWeight:700}}>{p.ticker} <span style={{color:C.textDim,fontWeight:400,fontSize:11}}>{STOCK_NAMES[p.ticker]}</span></div>
                      <div style={{color:C.textDim,fontSize:11}}>{p.shares} × ${p.buyPrice} · {p.date}</div>
                      <div style={{color:C.textDim,fontSize:11}}>Huidig: ${p.last?.toFixed(2)||"—"}</div>
                      {data?.overall&&<div style={{marginTop:4}}><OverallBadge signal={data.overall}/></div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:p.pnl>=0?C.green:C.red,fontWeight:700,fontSize:16}}>{p.pnl>=0?"+":""}${p.pnl.toFixed(0)}</div>
                      <div style={{color:p.pnl>=0?C.green:C.red,fontSize:12}}>{((p.pnl/p.cb)*100).toFixed(1)}%</div>
                    </div>
                    <button onClick={()=>remove(i)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>Verwijder</button>
                  </div>
                );
              })}
            </div>
          }
        </div>
      )}

      {selected&&(
        <Detail ticker={selected} data={getStockData(selected)}
          onClose={()=>setSelected(null)} portfolio={portfolio} add={add}/>
      )}

      <div style={{borderTop:`1px solid ${C.border}`,padding:"8px 16px",textAlign:"center",color:C.muted,fontSize:10}}>
        Technische data via yfinance · Fundamentals jun 2026 · Signaalgewichten zijn indicatief · Geen financieel advies
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
