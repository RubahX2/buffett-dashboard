// ── BUFFETT SCORE ─────────────────────────────────────────────────────────────
function bScore(f) {
  if (!f) return 0;
  // ETF's hebben geen fundamentals (pe/roe/marge zijn null). In JS is `null < 15`
  // gelijk aan `true`, dus zonder deze check zou een ETF een ONTERECHTE score krijgen.
  // Geen cijfers = geen oordeel.
  if (f.pe==null && f.roe==null && f.netMargin==null) return null;
  let s = 0;
  if (f.pe > 0 && f.pe < 15) s+=22; else if (f.pe<20) s+=14; else if (f.pe<28) s+=7;
  if (f.roe > 20) s+=20; else if (f.roe>12) s+=10;
  if (f.fcfYield > 5) s+=15; else if (f.fcfYield>2.5) s+=8;
  if (f.debtEquity>=0&&f.debtEquity<0.5) s+=15;
  else if (f.debtEquity<1) s+=8;
  else if (f.debtEquity>2.5) s-=8;
  if (f.netMargin > 20) s+=15; else if (f.netMargin>10) s+=8;
  if (f.revenueGrowth > 10) s+=8; else if (f.revenueGrowth>4) s+=4;
  if (f.divYield > 0) s+=3;
  return Math.min(100, Math.max(0, s));
}

function Ring({ score, size=48 }) {
  // ETF's hebben geen Buffett-score (score is null). Toon een neutrale ring met "ETF"
  // in plaats van een misleidende lege/rode ring.
  if (score==null) {
    const r0=(size/2)-5;
    return (
      <svg width={size} height={size} style={{flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r0} fill="none" stroke={C.border} strokeWidth={5}/>
        <text x="50%" y="50%" textAnchor="middle" dominantBaseline="central"
          style={{fill:C.textDim,fontSize:size<44?9:11,fontWeight:700}}>ETF</text>
      </svg>
    );
  }
  const r=(size/2)-5, circ=2*Math.PI*r, fill=circ*(1-score/100);
  const col=score>=70?C.green:score>=50?C.accent:C.red;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={5}
        strokeDasharray={circ} strokeDashoffset={fill} strokeLinecap="round"/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,
          fill:col,fontSize:size<44?10:13,fontWeight:700}}>{score}</text>
    </svg>
  );
}

function ValuationPanel({ valuation, fund }) {
  if (!valuation) {
    return <div style={{color:C.textDim,textAlign:"center",padding:20}}>
      Nog geen waarderingsdata beschikbaar.
    </div>;
  }
  const v = valuation;
  const colorHex = {green:C.green, neutral:C.textDim, orange:C.orange, red:C.red}[v.verdictColor] || C.text;

  // PEG meter (0 to 4 scale)
  const pegVal = v.peg;
  const pegPos = pegVal != null ? Math.min(pegVal / 4 * 100, 100) : null;

  return (
    <div>
      {/* Verdict hero */}
      <div style={{background:C.bg,borderRadius:8,padding:14,marginBottom:12,
        borderLeft:`3px solid ${colorHex}`}}>
        <div style={{color:C.textDim,fontSize:11,marginBottom:4}}>Waarderingsoordeel</div>
        <div style={{color:colorHex,fontSize:15,fontWeight:700,lineHeight:1.3}}>{v.verdict}</div>
        {v.notes && v.notes.length>0 && (
          <div style={{color:C.muted,fontSize:10,marginTop:6}}>{v.notes.join(" · ")}</div>
        )}
      </div>

      {/* PEG meter */}
      {pegVal != null && (
        <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.textDim,fontSize:11}}>PEG-ratio (P/E ÷ groei)</span>
            <span style={{color:colorHex,fontWeight:700,fontSize:13}}>{pegVal}</span>
          </div>
          <div style={{position:"relative",height:8,background:"#0a0d12",borderRadius:4,overflow:"hidden"}}>
            {/* zones: <1 green, 1-2.5 neutral, >2.5 red */}
            <div style={{position:"absolute",left:0,width:"25%",height:"100%",background:"#14532d",opacity:0.5}}/>
            <div style={{position:"absolute",left:"25%",width:"37.5%",height:"100%",background:"#334155",opacity:0.4}}/>
            <div style={{position:"absolute",left:"62.5%",width:"37.5%",height:"100%",background:"#450a0a",opacity:0.5}}/>
            <div style={{position:"absolute",left:`${pegPos}%`,top:-2,width:2,height:12,background:C.accent}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:8,color:C.muted}}>
            <span>0 goedkoop</span><span>1</span><span>2.5</span><span>4+ duur</span>
          </div>
          {v.pegNormalized != null && v.normalizedGrowth != null && (
            <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:C.textDim,fontSize:10}}>
                Bij normale groei (~{v.normalizedGrowth}%)
              </span>
              <span style={{color:v.pegNormalized<2.5?C.green:v.pegNormalized<3.5?C.orange:C.textDim,fontWeight:700,fontSize:13}}>
                PEG {v.pegNormalized}
              </span>
            </div>
          )}
          {v.isCyclical && Array.isArray(v.pegCurve) && v.pegCurve.length > 1 && (
            <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
              <div style={{color:C.textDim,fontSize:10,marginBottom:6,lineHeight:1.4}}>
                <b style={{color:C.orange}}>Cyclisch aandeel</b> — de PEG hangt sterk af van de groei,
                en die schommelt door de cyclus. Bekijk de PEG bij verschillende groeivoeten en
                oordeel zelf welke representatief is:
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {v.pegCurve.map((pt,i)=>{
                  const pc = pt.peg<1.5?C.green:pt.peg<2.5?C.textDim:pt.peg<3.5?C.orange:C.red;
                  const isNow = v.peg!=null && Math.abs(pt.peg - v.peg) < 0.01;
                  return (
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                      padding:"3px 8px",borderRadius:4,
                      background:isNow?"#1a1200":"transparent",
                      border:isNow?`1px solid ${C.orange}`:"1px solid transparent"}}>
                      <span style={{color:C.textDim,fontSize:11}}>
                        groei {pt.growth}%{isNow?" (nu)":""}
                      </span>
                      <span style={{color:pc,fontWeight:700,fontSize:12}}>PEG {pt.peg}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{color:C.muted,fontSize:9,marginTop:5,lineHeight:1.4}}>
                Een lage PEG bij piekgroei betekent niet dat het aandeel structureel goedkoop is —
                als de cyclus draait, daalt de groei en stijgt de PEG.
              </div>
            </div>
          )}
        </div>
      )}

      {/* P/E percentiel (alleen met echte FMP-data) */}
      {v.pePercentile != null ? (
        <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.textDim,fontSize:11}}>P/E vs eigen historie (5j)</span>
            <span style={{color:v.pePercentile<30?C.green:v.pePercentile>70?C.red:C.text,fontWeight:700,fontSize:13}}>
              {v.pePercentile}ᵉ percentiel
            </span>
          </div>
          <div style={{position:"relative",height:8,background:"#0a0d12",borderRadius:4}}>
            <div style={{position:"absolute",left:`${v.pePercentile}%`,top:-2,width:2,height:12,background:C.accent}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:C.textDim}}>
            <span>Laag: <b style={{color:C.green}}>{v.peMin}x</b></span>
            <span>Mediaan: <b>{v.peMedian}x</b></span>
            <span>Hoog: <b style={{color:C.red}}>{v.peMax}x</b></span>
          </div>
          <div style={{fontSize:9,color:C.muted,marginTop:6}}>Bron: echte historische P/E (FMP)</div>
        </div>
      ) : (
        <div style={{background:C.bg,borderRadius:8,padding:10,marginBottom:10,fontSize:10,color:C.muted}}>
          P/E-percentiel vereist FMP-historie. Nu wordt PEG gebruikt als groei-gecorrigeerde
          waarderingsmaatstaf. (Stel <code style={{color:C.accent}}>FMP_API_KEY</code> in als GitHub Secret voor echte historische P/E.)
        </div>
      )}

      {/* Prijspositie in range */}
      {v.priceRangePosition != null && (
        <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.textDim,fontSize:11}}>Prijspositie in 5-jaars range</span>
            <span style={{color:C.text,fontWeight:700,fontSize:13}}>{v.priceRangePosition}%</span>
          </div>
          <div style={{position:"relative",height:8,background:"linear-gradient(90deg,#14532d,#334155,#450a0a)",borderRadius:4,opacity:0.6}}>
            <div style={{position:"absolute",left:`${v.priceRangePosition}%`,top:-2,width:2,height:12,background:C.accent}}/>
          </div>
          <div style={{fontSize:9,color:C.muted,marginTop:6}}>
            Let op: dit is prijspositie, geen waardering — een aandeel hoog in zijn range kan nog goedkoop zijn als de winst sneller groeide.
          </div>
        </div>
      )}

      {/* Huidige P/E */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        <div style={{background:C.bg,borderRadius:6,padding:"8px 10px"}}>
          <div style={{color:C.textDim,fontSize:10}}>Huidige P/E</div>
          <div style={{color:C.text,fontSize:14,fontWeight:700}}>{v.currentPE!=null?`${v.currentPE}x`:"—"}</div>
        </div>
        <div style={{background:C.bg,borderRadius:6,padding:"8px 10px"}}>
          <div style={{color:C.textDim,fontSize:10}}>Omzetgroei (YoY)</div>
          <div style={{color:C.text,fontSize:14,fontWeight:700}}>{fund?.revenueGrowth!=null?`${fund.revenueGrowth>=0?"+":""}${fund.revenueGrowth}%`:"—"}</div>
        </div>
      </div>
    </div>
  );
}

function ScoreBar({ label, score, max=100, hint }) {
  const pct = Math.max(0, Math.min(100, (score/max)*100));
  const col = score>=70?C.green:score>=50?C.accent:score>=35?C.orange:C.red;
  return (
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{color:C.textDim,fontSize:11}}>{label}{hint&&<span style={{color:C.muted,fontSize:9}}> · {hint}</span>}</span>
        <span style={{color:col,fontSize:12,fontWeight:700}}>{score!=null?score:"—"}</span>
      </div>
      <div style={{height:6,background:"#0a0d12",borderRadius:3,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:3,transition:"width 0.3s"}}/>
      </div>
    </div>
  );
}

function TimingBreakdown({ timing }) {
  if (!timing) return <div style={{color:C.textDim,textAlign:"center",padding:16}}>Geen timing-data.</div>;
  const t = timing;
  const tfColor = v => v==null?C.muted:v>=60?C.green:v>=45?C.accent:v>=35?C.orange:C.red;
  return (
    <div>
      <div style={{background:C.bg,borderRadius:8,padding:14,marginBottom:12,
        borderLeft:`3px solid ${{green:C.green,neutral:C.textDim,orange:C.orange,red:C.red}[t.color]||C.text}`}}>
        <div style={{color:C.textDim,fontSize:11,marginBottom:2}}>Timing-oordeel</div>
        <div style={{color:{green:C.green,neutral:C.textDim,orange:C.orange,red:C.red}[t.color]||C.text,fontSize:16,fontWeight:800}}>
          {t.score}/100 · {t.label}
        </div>
      </div>

      <div style={{fontSize:11,color:C.textDim,marginBottom:6,fontWeight:700}}>SAMENSTELLING</div>
      <ScoreBar label="Trend-score (uptrend?)" score={t.trendScore} hint="hogere TF's wegen zwaarder"/>
      <ScoreBar label="Entry-score (goede instap nu?)" score={t.entryScore} hint="vooral daily"/>

      <div style={{fontSize:11,color:C.textDim,margin:"14px 0 6px",fontWeight:700}}>TREND PER TIMEFRAME</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        {[["Monthly",t.trendMonthly,"45%"],["Weekly",t.trendWeekly,"35%"],["Daily",t.trendDaily,"20%"]].map(([lbl,v,w])=>(
          <div key={lbl} style={{background:C.bg,borderRadius:6,padding:"8px 6px",textAlign:"center"}}>
            <div style={{color:C.muted,fontSize:9}}>{lbl} <span style={{color:C.muted}}>({w})</span></div>
            <div style={{color:tfColor(v),fontSize:16,fontWeight:800}}>{v!=null?v:"—"}</div>

        ))}

      )}
      <div style={{marginTop:10,fontSize:9,color:C.muted,lineHeight:1.5}}>
        Filosofie: koop kwaliteit in een uptrend die net is teruggevallen. Hoge trend + hoge entry = ideale setup.
        Hoge trend maar lage entry = uptrend maar overbought (wachten op pullback).
      </div>
    </div>
  );
}

// ── JOUW AANKOPEN TEGENOVER HET MODEL ─────────────────────────────────────────
// WAT DIT WEL EN NIET MEET -- lees dit voor je conclusies trekt.
//
// De eerste versie berekende "hoeveel duurder kocht je dan het signaal". Dat cijfer
// was VERTEKEND, om drie redenen:
//
//   1. LATENTIE. De cron draait 's ochtends; je koopt de dag erna. Elke aankoop is
//      dus per constructie "te laat". Dat meet de vertraging van het SYSTEEM, niet
//      je discipline.
//   2. WACHTEN WORDT AFGESTRAFT. Bij een vast maandbedrag kan wachten juist lucratief
//      zijn. Een spiegel die elke dag vertraging als verlies boekt, straft precies het
//      geduld af dat je wilt aanleren.
//   3. HET NEGEERDE DE ECHTE FOUT. Een aankoop tegen een VERKOOP-signaal in verdween
//      als "geen signaal gevonden" -- terwijl dat het belangrijkste datapunt is dat er
//      bestaat.
//
// Deze versie meet daarom niet de prijsafstand, maar de RICHTING: kocht je MET het
// model mee, of ertegenin? Dat is de vraag die je gedrag echt blootlegt, en hij is
// ongevoelig voor de latentie van de cron.
function PurchaseMirror({ portfolio, track, stocks }) {
  const recs = Object.values(track?.records || {});

  if (!portfolio?.length) {
    return (
      <div style={{background:C.panel,border:`1px dashed ${C.border}`,borderRadius:8,
        padding:"14px 16px",marginBottom:16,color:C.textDim,fontSize:11,lineHeight:1.6}}>
        <div style={{color:C.accent,fontSize:13,fontWeight:700,marginBottom:5}}>
          🪞 Jouw aankopen tegenover het model
        </div>
        Zodra je posities toevoegt verschijnt hier of je MET het model kocht of ertegenin.
      </div>
    );
  }

  // Voor elke positie: wat zei het model rond je aankoopdatum?
  // We kijken naar signalen tot 14 dagen VOOR de aankoop (het signaal moest er al zijn)
  // en hooguit 2 dagen erna (het kan die ochtend gedraaid zijn).
  const rows = portfolio.map(p => {
    const buyDate = new Date(p.date);
    const rondom = recs
      .filter(r => r.ticker === p.ticker)
      .map(r => ({...r, dagen: Math.round((buyDate - new Date(r.date)) / 86400000)}))
      .filter(r => r.dagen >= -2 && r.dagen <= 14)
      .sort((a,b) => Math.abs(a.dagen) - Math.abs(b.dagen));

    const sig = rondom[0] || null;
    // De huidige stand -- als het model NU verkoop zegt en je hebt het gekocht,
    // is dat op zichzelf al informatie.
    const nu = stocks?.[p.ticker]?.overall || null;

    let oordeel = "geen", kleur = C.muted, uitleg = "";
    if (sig) {
      if (sig.direction === "BUY") {
        oordeel = "MET het model"; kleur = C.green;
        uitleg = `${sig.snapshot?.overall || "koopsignaal"} rond je aankoop`;
      } else if (sig.type === "caution") {
        oordeel = "TEGEN het model"; kleur = C.orange;
        uitleg = "het model waarschuwde voor overextensie";
      } else {
        oordeel = "TEGEN het model"; kleur = C.red;
        uitleg = `${sig.snapshot?.overall || "verkoopsignaal"} rond je aankoop`;
      }
    } else {
      // Waarom staat hier "geen signaal" terwijl het bord vandaag STERK KOOP toont?
      // Omdat het trackrecord alleen STERKE signalen vastlegt (STERK KOOP / STERK
      // VERKOOP / CAUTION), en hoogstens een per 10 dagen per aandeel. Een gewone
      // "KOOP" komt er niet in. En een sterk signaal dat NA je aankoop ontstond,
      // telt hier terecht niet mee -- je kon het niet weten.
      //
      // Dit label moet dus niet suggereren dat het model niets vond; het zegt dat er
      // geen VASTGELEGDE episode rond jouw aankoopdatum lag.
      uitleg = nu
        ? `geen vastgelegde episode rond je aankoop (bord staat nu op ${nu})`
        : "geen vastgelegde episode rond je aankoopdatum";
    }
    return {...p, sig, nu, oordeel, kleur, uitleg};
  });

  const mee    = rows.filter(r => r.oordeel === "MET het model").length;
  const tegen  = rows.filter(r => r.oordeel === "TEGEN het model").length;
  const zonder = rows.filter(r => r.oordeel === "geen").length;

  return (
    <div style={{background:C.panel,border:`1px solid ${tegen>0?C.orange+"66":C.border}`,
      borderRadius:8,padding:"12px 14px",marginBottom:16}}>
      <div style={{color:C.accent,fontSize:13,fontWeight:700}}>
        🪞 Jouw aankopen tegenover het model
      </div>
      <div style={{color:C.muted,fontSize:10,marginTop:2,marginBottom:10}}>
        Kocht je MET het model mee, of ertegenin?
      </div>

      <div style={{display:"flex",gap:8,marginBottom:11}}>
        {[["MET het model",mee,C.green],["TEGEN het model",tegen,C.red],
          ["Geen signaal",zonder,C.muted]].map(([l,v,c],i)=>(
          <div key={i} style={{flex:1,background:C.bg,borderRadius:6,padding:"7px 9px",
            border:`1px solid ${v>0?c+"44":C.border}`}}>
            <div style={{color:c,fontSize:19,fontWeight:700}}>{v}</div>
            <div style={{color:C.textDim,fontSize:9}}>{l}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {rows.map(r => (
          <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,fontSize:11,
            padding:"6px 8px",background:C.bg,borderRadius:5,
            borderLeft:`3px solid ${r.kleur}`}}>
            <span style={{color:C.accent,fontWeight:700,minWidth:62}}>{r.ticker}</span>
            <span style={{color:r.kleur,fontWeight:600,minWidth:112,fontSize:10}}>
              {r.oordeel==="geen" ? "—" : r.oordeel}
            </span>
            <span style={{color:C.textDim,fontSize:10,flex:1}}>{r.uitleg}</span>
            {r.nu && (
              <span style={{color:C.muted,fontSize:9}}>
                nu: <span style={{color:r.nu.includes("VERKOOP")?C.red
                  :r.nu.includes("KOOP")?C.green:C.textDim}}>{r.nu}</span>
              </span>
            )}
          </div>
        ))}
      </div>

      {tegen > 0 && (
        <div style={{background:"#1c1a06",border:`1px solid ${C.orange}55`,borderRadius:6,
          padding:"9px 11px",marginTop:10,color:C.textDim,fontSize:10,lineHeight:1.6}}>
          <b style={{color:C.orange}}>{tegen} {tegen===1?"positie":"posities"} tegen het model in.</b>{" "}
          Dat is niet automatisch fout — jij weet dingen die het model niet weet. Maar het is
          wel de vraag waar je een antwoord op wilt: <b style={{color:C.text}}>had je gelijk,
          of het model?</b> Over een paar maanden zie je dat in de uitkomsten hieronder.
        </div>
      )}

      <div style={{color:C.muted,fontSize:9,marginTop:9,borderTop:`1px solid ${C.border}`,
        paddingTop:7,lineHeight:1.6}}>
        <b style={{color:C.textDim}}>Bewust geen prijsvergelijking.</b> De cron draait 's ochtends
        en je koopt de dag erna — elke aankoop zou dan "te laat" heten, terwijl dat de vertraging
        van het systeem meet en niet je discipline. Bij een vast maandbedrag kan wachten bovendien
        juist lucratief zijn. De richting zegt meer dan de prijsafstand.
      </div>
    </div>
  );
}

// ── MODELDIAGNOSTIEK ──────────────────────────────────────────────────────────
// Twee checks die VANDAAG al iets zeggen -- geen jaar forward returns nodig.
//   1. Base rates: vuurt een signaal discriminerend, of beschrijft het de markt?
//      Een signaal dat op 80% van je aandelen vuurt selecteert niets.
//   2. Correlaties: meten je subscores verschillende dingen? Zo niet, dan telt het
//      composiet hetzelfde signaal DUBBEL en doet alsof het bevestiging is.
function ModelDiagnostics({ diag, version }) {
  const [open,setOpen] = useState(false);
  if (!diag || diag.error) return null;
  const warns = diag.corrWarnings || [];

  const cellColor = v => {
    if (v==null) return C.muted;
    const a = Math.abs(v);
    if (a>=0.80) return C.red;
    if (a>=0.60) return C.orange;
    if (a>=0.35) return C.text;
    return C.textDim;
  };

  return (
    <div style={{marginBottom:16,background:C.panel,
      border:`1px solid ${warns.length?C.orange+"66":C.border}`,borderRadius:8,padding:"12px 14px"}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",
        justifyContent:"space-between",cursor:"pointer"}}>
        <div>
          <div style={{color:warns.length?C.orange:C.accent,fontSize:13,fontWeight:700}}>
            🔬 Modeldiagnostiek {warns.length>0?`— ${warns.length} waarschuwing(en)`:""}
          </div>
          <div style={{color:C.muted,fontSize:10,marginTop:2}}>
            Werkt het model, of houdt het zichzelf voor de gek? · {diag.n} aandelen
            {version?` · model ${version}`:""}
          </div>
        </div>
        <span style={{color:C.textDim,fontSize:12}}>{open?"▲":"▼"}</span>
      </div>

      {open&&(
        <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:14}}>

          <div>
            <div style={{color:C.text,fontSize:12,fontWeight:700,marginBottom:4}}>
              Vuurt een signaal discriminerend?
            </div>
            <div style={{color:C.textDim,fontSize:10,lineHeight:1.5,marginBottom:7}}>
              Een signaal dat op meer dan de helft van je aandelen vuurt <b style={{color:C.text}}>selecteert
              niets</b> — het beschrijft de markt. Dat is geen inzicht, dat is een label op een marktbeweging.
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              {(diag.baseRates||[]).map((b,i)=>{
                const col = b.color==="red"?C.red:b.color==="orange"?C.orange
                          :b.color==="green"?C.green:C.muted;
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}>
                    <span style={{color:C.text,minWidth:105,fontWeight:600}}>{b.action}</span>
                    <div style={{flex:1,height:5,background:C.bg,borderRadius:3,overflow:"hidden",maxWidth:130}}>
                      <div style={{height:"100%",width:`${Math.min(100,b.pct)}%`,background:col}}/>
                    </div>
                    <span style={{color:C.textDim,minWidth:60,fontSize:10}}>{b.n}× ({b.pct}%)</span>
                    <span style={{color:col,fontSize:10}}>{b.verdict}</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div>
            <div style={{color:C.text,fontSize:12,fontWeight:700,marginBottom:4}}>
              Meten de subscores verschillende dingen?
            </div>
            <div style={{color:C.textDim,fontSize:10,lineHeight:1.5,marginBottom:7}}>
              Het composiet telt kwaliteit, waardering en timing op alsof het{" "}
              <b style={{color:C.text}}>onafhankelijke stemmen</b> zijn. Correleren twee scores sterk
              (|r| ≥ 0,80), dan meten ze hetzelfde en weeg je dat signaal <b style={{color:C.orange}}>dubbel</b>.
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontSize:10}}>
                <thead>
                  <tr>
                    <th style={{padding:"3px 6px"}}></th>
                    {(diag.corrLabels||[]).map((l,i)=>(
                      <th key={i} style={{color:C.textDim,padding:"3px 5px",fontWeight:600,
                        fontSize:9,height:"auto",verticalAlign:"bottom",
                        whiteSpace:"nowrap"}}>{l}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {(diag.corrMatrix||[]).map((row,i)=>(
                    <tr key={i}>
                      <td style={{color:C.text,padding:"3px 8px 3px 0",fontWeight:600,whiteSpace:"nowrap"}}>
                        {row.label}
                      </td>
                      {row.cells.map((v,j)=>(
                        <td key={j} style={{padding:"3px 6px",textAlign:"center",
                          color:i===j?C.muted:cellColor(v),
                          fontWeight:(v!=null&&Math.abs(v)>=0.8&&i!==j)?700:400,
                          background:(v!=null&&Math.abs(v)>=0.8&&i!==j)?C.red+"22":"transparent"}}>
                          {i===j?"—":(v==null?"·":v.toFixed(2))}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {warns.length>0&&(
            <div style={{background:"#1c1a06",border:`1px solid ${C.orange}55`,borderRadius:6,padding:"9px 11px"}}>
              <div style={{color:C.orange,fontSize:11,fontWeight:700,marginBottom:5}}>
                ⚠ Deze subscores meten hetzelfde
              </div>
              {warns.map((w,i)=>(
                <div key={i} style={{color:C.textDim,fontSize:10,lineHeight:1.6,
                  marginBottom:i<warns.length-1?6:0}}>
                  <b style={{color:C.text}}>{w.a} ↔ {w.b}: r = {w.r>=0?"+":""}{w.r}</b><br/>
                  {w.note}
                </div>
              ))}
            </div>
          )}

          <div style={{color:C.muted,fontSize:9,borderTop:`1px solid ${C.border}`,paddingTop:7,lineHeight:1.6}}>
            Dit meet het MODEL, niet je rendement. Het zegt niets over of de score
            <i> voorspelt</i> — daarvoor is een jaar forward returns nodig, en zelfs dan
            meet je vooral het marktregime van dat jaar.
          </div>
        </div>
      )}
    </div>
  );
}

function TrackRecord({ track }) {
  if (!track) {
    return (
      <div style={{textAlign:"center",color:C.textDim,padding:30}}>
        Nog geen trackrecord. Dit vult zich vanaf de eerste GitHub Actions run met de nieuwe versie;
        uitkomsten verschijnen naarmate de horizons (1/4/13/26 weken) verstrijken.
      </div>
    );
  }
  const acc = track.accuracy || {};
  const bench = track.benchmarkName || "benchmark";
  const minObs = track.minObservations || 20;
  const records = track.records || {};
  const recList = Object.values(records);
  const [tab, setTab] = useState("monthly_pick");
  const HORIZONS = track.horizonsWeeks || [1,4,13,26];

  // CAUTION is een aparte, FALSIFICEERBARE voorspelling: "rijp voor terugval".
  // Als die aandelen juist doorstijgen, straft het model gezonde uitbraken af --
  // precies de NET-les. Daarom een eigen tabblad, gescheiden van de sterke signalen.
  const typeLabel = {monthly_pick:"Maandaanbeveling", strong_signal:"Sterke signalen",
                     caution:"Overextensie \u26a0"};

  const typeRecs = recList.filter(r=>r.type===tab)
    .sort((a,b)=> (b.date||"").localeCompare(a.date||""));

  return (
    <div>
      {/* Disclaimer */}
      <div style={{background:"#1c1206",border:"1px solid #854d0e",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:11,color:C.orange,lineHeight:1.5}}>
        ⚠ Observatie-instrument, geen bewijs. Accuraatheid wordt pas getoond vanaf {minObs} afgeronde
        observaties per horizon — daaronder zie je enkel de telling en gemiddelde return. Alles is
        gemeten <b>relatief tot {bench}</b> (beter dan de index, niet "ging de markt omhoog"). Het model
        past nooit zelf gewichten aan; jij trekt de conclusies.
      </div>

      {/* Type toggle */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {["monthly_pick","strong_signal","caution"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            background:tab===t?C.accent:"none",color:tab===t?C.bg:C.textDim,
            border:`1px solid ${tab===t?C.accent:C.border}`,borderRadius:5,
            padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:tab===t?700:400}}>
            {typeLabel[t]}
          </button>
        ))}
      </div>

      {/* Accuracy grid per horizon */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:16}}>
        {HORIZONS.map(wk=>{
          const e = (acc[tab]||{})[`${wk}w`] || {n:0,status:"geen data"};
          const relColor = e.avgRelativeReturn==null?C.textDim:e.avgRelativeReturn>0?C.green:C.red;
          return (
            <div key={wk} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
              <div style={{color:C.textDim,fontSize:10,marginBottom:4}}>Na {wk} {wk===1?"week":"weken"}</div>
              {e.accuracyShown?(
                <>
                  <div style={{color:e.accuracy>=50?C.green:C.red,fontSize:22,fontWeight:800}}>{e.accuracy}%</div>
                  <div style={{color:C.muted,fontSize:9}}>beter dan index · n={e.n}</div>
                </>
              ):(
                <>
                  <div style={{color:C.textDim,fontSize:14,fontWeight:700}}>{e.n>0?`n=${e.n}`:"—"}</div>
                  <div style={{color:C.muted,fontSize:9}}>{e.status}</div>
                </>
              )}
              {e.avgRelativeReturn!=null&&(
                <div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${C.border}`}}>
                  <div style={{color:relColor,fontSize:13,fontWeight:700}}>{e.avgRelativeReturn>0?"+":""}{e.avgRelativeReturn}%</div>
                  <div style={{color:C.muted,fontSize:9}}>gem. vs {bench}</div>
                </div>

function FibLevelRows({ entries, currentPrice, cur, accent }) {
  // TradingView-kleurcodering per fib-niveau, zodat de zones hier hetzelfde ogen als op
  // je chart. De golden pocket (0.618/0.705) is geel, de kern-extensie 1.618 blauw,
  // de verre 2.618/3.618 rood/groen. Ruben herkent de zones zo in een oogopslag.
  const fibColor = (label)=>{
    const l = String(label);
    if (l==="0.618"||l==="0.65"||l==="0.68"||l==="0.705"||l==="0.71"||l==="0.786") return "#e5c100"; // geel (golden pocket + entry)
    if (l==="0.5"||l==="1.414") return "#e0533d";   // rood
    if (l==="0.886"||l==="1.818") return "#3fae6b";  // groen
    if (l==="1.618") return "#3d7ee0";               // blauw (kern-TP)
    if (l==="2.618"||l==="1.272") return "#e0533d";  // rood (verre extensie)
    if (l==="3.618") return "#a855c9";               // paars
    return null; // 0.236 / 0.382 / 1.0 / 0.0 -> neutraal
  };
  return entries.map((f,i)=>{
    const dist = Math.abs((currentPrice-f.price)/currentPrice*100);
    const isNear = dist < 3, isCurrent = dist < 1.5;
    const inGP = f.gp;
    const lblColor = fibColor(f.label) || (accent==="green"?C.teal:C.orange);
    return (
      <div key={i} style={{
        display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"4px 7px",borderRadius:4,marginBottom:3,
        background:isCurrent?(accent==="green"?"#052e16":"#450a0a"):inGP?"#1c2610":isNear?"#1a1f2e":"transparent",
        border:`1px solid ${isCurrent?(accent==="green"?C.green:C.red):inGP?C.gold||"#a3852f":C.border}`,
      }}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{color:lblColor,fontSize:11,fontWeight:700,minWidth:42}}>{f.label}</span>
          {inGP&&<span style={{fontSize:8,color:C.gold||"#c9a227",fontWeight:700}}>GOLDEN</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {isCurrent&&<span style={{fontSize:9,color:C.accent,fontWeight:700}}>← NU</span>}
          {isNear&&!isCurrent&&<span style={{fontSize:9,color:C.orange}}>{dist.toFixed(1)}%</span>}
          <span style={{color:isNear?C.text:C.textDim,fontSize:12,fontWeight:isNear?700:400}}>{cur}{f.price}</span>
        </div>
      </div>
    );
  });
}

function FibTable({ fib, currentPrice, cur="$" }) {
  if (!fib) return null;
  const { retracements, extensions, goldenPocket, swingLow, swingHigh, extSwingLow, extSwingHigh } = fib;
  const gpLo = goldenPocket?.low, gpHi = goldenPocket?.high;
  // Retracements: hoogste prijs boven (0.000 = top), aflopend naar 1.000 (bodem)
  const retr = Object.entries(retracements||{})
    .map(([k,v])=>({label:k,price:v,gp:(v>=gpLo&&v<=gpHi)}))
    .sort((a,b)=>b.price-a.price);
  // Extensies: hoogste TP boven, aflopend
  const ext = Object.entries(extensions||{})
    .map(([k,v])=>({label:k,price:v,gp:false}))
    .sort((a,b)=>b.price-a.price);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* SET 1 — Retracement / entry */}
      <div style={{background:C.bg,borderRadius:8,padding:12}}>
        <div style={{color:C.teal,fontSize:11,fontWeight:800,marginBottom:2}}>RETRACEMENT · instapzones</div>
        <div style={{fontSize:9,color:C.muted,marginBottom:6}}>
          Swing {cur}{swingLow} → {cur}{swingHigh} (bodem→top, log-schaal) · golden pocket 0.618–0.705 = premium entry
        </div>
        <FibLevelRows entries={retr} currentPrice={currentPrice} cur={cur} accent="green"/>
      </div>
      {/* SET 2 — Extensie / take-profit */}
      <div style={{background:C.bg,borderRadius:8,padding:12}}>
        <div style={{color:C.orange,fontSize:11,fontWeight:800,marginBottom:2}}>EXTENSIE · winstnemingszones</div>
        <div style={{fontSize:9,color:C.muted,marginBottom:6}}>
          Swing {cur}{extSwingHigh ?? swingHigh} → {cur}{extSwingLow ?? swingLow} (top→bodem, chronologisch) · log-schaal, extensies omhoog · 1.618 = kern-TP
        </div>
        <FibLevelRows entries={ext} currentPrice={currentPrice} cur={cur} accent="red"/>
      </div>
    </div>
  );
}

function usePortfolio() {
  const newId = ()=> (typeof crypto!=="undefined"&&crypto.randomUUID)
    ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
  const nu = ()=> Date.now();

  // ── SYNC TUSSEN APPARATEN ───────────────────────────────────────────────────
  // localStorage is PER BROWSER, PER APPARAAT. Je iPad-Safari en je iPhone-Safari
  // hebben elk hun eigen opslag en weten niets van elkaar. Dat is geen bug maar een
  // eigenschap van de browser -- en dus niet iets dat je wegprogrammeert, alleen
  // iets waar je omheen bouwt.
  //
  // De vorige sync OVERSCHREEF: schreef je op je iPad een notitie bij ANET en op je
  // iPhone een bij MU, dan wiste een sync er een van de twee. Dat is erger dan geen
  // sync, want je merkt het pas als het te laat is.
  //
  // Deze versie VOEGT SAMEN. Elke positie en elke notitie draagt een tijdstempel
  // (`ts`). Bij een sync:
  //   - bestaat iets alleen op het ENE apparaat  -> het komt erbij
  //   - bestaat iets op BEIDE                    -> de NIEUWSTE versie wint
  //   - is iets ongewijzigd                      -> er verandert niets
  // Niets gaat verloren. Je kunt in beide richtingen syncen zonder na te denken.
  const mergePosities = (lokaal, binnen)=>{
    const byId = {};
    for(const pos of lokaal) byId[pos.id] = pos;
    let nieuwe=0, bijgewerkt=0, ongewijzigd=0;
    for(const pos of binnen){
      if(!pos || !pos.id) continue;
      const bestaand = byId[pos.id];
      if(!bestaand){ byId[pos.id] = pos; nieuwe++; }
      else if((pos.ts||0) > (bestaand.ts||0)){ byId[pos.id] = pos; bijgewerkt++; }
      else ongewijzigd++;
    }
    return {lijst:Object.values(byId), nieuwe, bijgewerkt, ongewijzigd};
  };

  // Notities: {TICKER: {text, ts}}. Oud formaat was {TICKER: "tekst"} zonder tijdstempel
  // -- die krijgen ts=0 en verliezen dus altijd van een versie MET tijdstempel. Dat is
  // correct: een notitie zonder tijdstempel is per definitie ouder dan een met.
  const normNotes = (obj)=>{
    const out = {};
    for(const [tk,v] of Object.entries(obj||{})){
      if(typeof v === "string") out[tk] = {text:v, ts:0};
      else if(v && typeof v.text === "string") out[tk] = {text:v.text, ts:v.ts||0};
    }
    return out;
  };
  const mergeNotities = (lokaal, binnen)=>{
    const L = normNotes(lokaal), B = normNotes(binnen);
    let nieuwe=0, bijgewerkt=0;
    for(const [tk,n] of Object.entries(B)){
      if(!L[tk]){ L[tk] = n; nieuwe++; }
      else if(n.ts > L[tk].ts){ L[tk] = n; bijgewerkt++; }
    }
    return {obj:L, nieuwe, bijgewerkt};
  };

  const [p,setP] = useState(()=>{
    try{
      const raw = JSON.parse(localStorage.getItem("bplus_v9")||"[]");
      // Migratie: posities zonder id OF zonder tijdstempel krijgen er nu een.
      // Zonder id zou update()/remove() op de verkeerde positie landen; zonder
      // tijdstempel kan de merge niet bepalen welke versie nieuwer is.
      return Array.isArray(raw) ? raw.map(pos=>({
        ...pos,
        id: pos.id || newId(),
        ts: pos.ts || 0,     // 0 = "onbekend, dus ouder dan alles met een echte ts"
      })) : [];
    }catch{return[]}
  });
  const save = v=>{setP(v);try{localStorage.setItem("bplus_v9",JSON.stringify(v))}catch{}};

  // Een #sync=... link importeert gegevens op DIT apparaat. Het #-deel van een URL
  // wordt nooit naar een server gestuurd -- dit blijft volledig lokaal en privé.
  useEffect(()=>{
    const m = window.location.hash.match(/^#sync=(.+)$/);
    if(!m) return;
    try{
      const data = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
      let binnenPos = [], binnenNotes = {};
      if(Array.isArray(data) && data.every(x=>x&&x.ticker)){
        binnenPos = data;                       // oud formaat: kale positielijst
      } else if(data && typeof data==="object" && Array.isArray(data.portfolio)){
        binnenPos   = data.portfolio;
        binnenNotes = data.notes || {};
      } else {
        throw new Error("onbekend formaat");
      }
      // Binnenkomende posities zonder id/ts opwaarderen, anders kan de merge ze niet
      // matchen en zouden ze als duplicaat binnenkomen.
      binnenPos = binnenPos.map(pos=>({...pos, id: pos.id||newId(), ts: pos.ts||0}));

      const rp = mergePosities(p, binnenPos);
      save(rp.lijst);

      let lokaalNotes = {};
      try{ lokaalNotes = JSON.parse(localStorage.getItem("bplus_notes_v1")||"{}"); }catch{}
      const rn = mergeNotities(lokaalNotes, binnenNotes);
      try{ localStorage.setItem("bplus_notes_v1", JSON.stringify(rn.obj)); }catch{}

      // Vertel PRECIES wat er gebeurd is. "Gesynchroniseerd" zegt niets; de gebruiker
      // wil weten of er iets is overschreven.
      const delen = [];
      if(rp.nieuwe)     delen.push(`${rp.nieuwe} nieuwe positie(s)`);
      if(rp.bijgewerkt) delen.push(`${rp.bijgewerkt} positie(s) bijgewerkt`);
      if(rn.nieuwe)     delen.push(`${rn.nieuwe} nieuwe notitie(s)`);
      if(rn.bijgewerkt) delen.push(`${rn.bijgewerkt} notitie(s) bijgewerkt`);
      const bericht = delen.length
        ? `\u2713 Samengevoegd: ${delen.join(", ")}.\n\nNiets is verloren gegaan \u2014 wat alleen op dit apparaat stond, staat er nog.`
        : "\u2713 Alles was al up-to-date. Er is niets veranderd.";
      alert(bericht + (rn.nieuwe||rn.bijgewerkt ? "\n\nHerlaad de pagina om je notities te zien." : ""));
    }catch(e){ alert("Sync-link kon niet gelezen worden."); }
    history.replaceState(null,"",window.location.pathname+window.location.search);
  },[]);

  const syncLink = ()=>{
    let notesObj={};
    try{notesObj=JSON.parse(localStorage.getItem("bplus_notes_v1")||"{}");}catch{}
    const payload = {portfolio:p, notes:normNotes(notesObj), v:2};
    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const url = window.location.origin + window.location.pathname + "#sync=" + b64;
    const nP=p.length, nN=Object.keys(notesObj).length;
    const summary = `${nP} positie(s)`+(nN>0?` + ${nN} notitie(s)`:"");
    if(navigator.share){ navigator.share({title:"BUFFETT+ sync",text:summary,url}).catch(()=>{}); }
    else if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url); alert(`Sync-link gekopieerd (${summary}) \u2014 open hem op je andere apparaat. Je gegevens worden SAMENGEVOEGD, niet overschreven.`); }
    else { prompt(`Kopieer deze sync-link (${summary}) en open hem op je andere apparaat:`, url); }
  };
  return {
    portfolio:p,
    // Elke positie krijgt een UNIEK id. Zonder dat werd de array-index als identiteit
    // gebruikt -- en die verschuift zodra je een positie verwijdert of de lijst
    // herschikt, waardoor een bewerking op de VERKEERDE positie kon landen (of een
    // bewerking als nieuwe positie werd toegevoegd).
    // Elke positie krijgt een tijdstempel bij het AANMAKEN en bij elke WIJZIGING.
    // Zonder ts kan de merge niet bepalen welke versie nieuwer is, en valt hij terug
    // op "eerste wint" -- wat willekeurig is en dus fout.
    add:(ticker,shares,buyPrice,date,reason,risk,note)=>save([...p,{
      id: newId(), ts: nu(),
      ticker,shares:+shares,buyPrice:+buyPrice,date,
      reason:reason||"",risk:risk||"",note:note||""}]),
    // Bewerken en verwijderen gaan op ID, NIET op array-index. Een index verschuift
    // zodra de lijst verandert; een id blijft bij de positie horen. Dit was de oorzaak
    // van bewerkingen die als nieuwe positie werden toegevoegd.
    update:(id,fields)=>save(p.map(pos=>pos.id===id?{...pos,...fields,ts:nu()}:pos)),
    remove:id=>save(p.filter(pos=>pos.id!==id)),
    syncLink,
  };
}

// Watchlist-notities per aandeel (los van posities): "waar vond ik dit", losse gedachten.
// Bewaard per ticker in een aparte localStorage-sleutel, werkt voor de hele watchlist —
// ook aandelen die je niet bezit.
//
// OPSLAG: {TICKER: {text, ts}} -- met tijdstempel, nodig voor de merge tussen apparaten.
// INTERFACE: `notes[ticker]` geeft nog steeds een STRING terug. De rest van de code
// hoeft dus niets te weten van het tijdstempel; die complexiteit blijft hier.
function useNotes() {
  // Zowel het oude formaat (kale string) als het nieuwe ({text,ts}) inlezen. Een
  // notitie zonder tijdstempel krijgt ts=0 en verliest dus altijd van een versie MET
  // tijdstempel -- wat klopt: hij is per definitie ouder.
  const lees = ()=>{
    let raw={};
    try{ raw = JSON.parse(localStorage.getItem("bplus_notes_v1")||"{}"); }catch{}
    const out = {};
    for(const [tk,v] of Object.entries(raw)){
      if(typeof v === "string") out[tk] = {text:v, ts:0};
      else if(v && typeof v.text === "string") out[tk] = {text:v.text, ts:v.ts||0};
    }
    return out;
  };
  const [store,setStore] = useState(lees);

  // Wat de rest van de app ziet: een platte {TICKER: "tekst"}. Zo hoeft geen enkele
  // andere component aangepast te worden.
  const notes = {};
  for(const [tk,v] of Object.entries(store)) notes[tk] = v.text;

  const saveNote = (ticker,text)=>{
    const next = {...store};
    if(text&&text.trim()) next[ticker] = {text, ts: Date.now()};
    else delete next[ticker];
    setStore(next);
    try{localStorage.setItem("bplus_notes_v1",JSON.stringify(next))}catch{}
  };
  return { notes, saveNote };
}

            </>)}
          </div>
        )}

        {tab==="portfolio"&&(
          <div>
            <AddPositionForm ticker={ticker} last={last}
              currency={data?.currency||"$"} add={add}/>
            {portfolio.filter(pos=>pos.ticker===ticker).map(pos=>(
              <PositionCard key={pos.id} p={pos} last={last}
                currency={data?.currency||"$"} update={update}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// Formulier om een positie toe te voegen. STAAT APART als component, met eigen state.
// Eerder zat deze state in Detail; die component hertekent bij elke wijziging, waardoor
// de ingevulde velden konden leeglopen (tekst selecteren wiste het formulier, en een
// leeg prijsveld blokkeerde de knop stilletjes).
//
// Het dagboek is INGEKLAPT by default: de meeste posities hebben geen thesis-notitie
// nodig, dus die drie velden hoeven niet permanent in beeld te staan.
function AddPositionForm({ ticker, last, currency, add }) {
  const [sh,setSh]   = useState("");
  const [pr,setPr]   = useState("");
  const [dt,setDt]   = useState(()=>new Date().toISOString().slice(0,10));
  const [rsn,setRsn] = useState("");
  const [rsk,setRsk] = useState("");
  const [nt,setNt]   = useState("");
  const [openJournal,setOpenJournal] = useState(false);

  // Vul de prijs met de huidige koers zodra die bekend is -- maar alleen als de
  // gebruiker nog niets zelf heeft ingetypt. (De koers is er soms nog niet bij de
  // eerste render; een useState-initialisatie zou dan voor altijd leeg blijven.)
  const touched = useRef(false);
  useEffect(()=>{
    if(!touched.current && last && !pr) setPr(last.toFixed(2));
  },[last]);   // eslint-disable-line react-hooks/exhaustive-deps

  const canSave = sh.trim()!=="" && pr.trim()!=="" && +sh>0 && +pr>0;
  const submit = ()=>{
    if(!canSave) return;
    add(ticker, sh, pr, dt, rsn, rsk, nt);
    setSh(""); setRsn(""); setRsk(""); setNt("");
    setOpenJournal(false);
    touched.current = false;
    if(last) setPr(last.toFixed(2));
  };
  const inp = {width:"100%",background:C.bg,border:`1px solid ${C.border}`,color:C.text,
    borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box"};
  const ta = extra => ({...inp,resize:"vertical",fontFamily:"inherit",background:C.bg,...extra});

  return (
    <div style={{marginBottom:16}}>
      <div style={{color:C.accent,fontSize:13,fontWeight:700,marginBottom:10}}>Positie toevoegen</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Aantal aandelen</div>
          <input value={sh} inputMode="decimal" placeholder="bijv. 10"
            onChange={e=>setSh(e.target.value)} style={inp}/>
        </div>
        <div>
          <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Aankoopprijs ({currency})</div>
          <input value={pr} inputMode="decimal"
            onChange={e=>{touched.current=true; setPr(e.target.value);}} style={inp}/>
        </div>
      </div>
      <div style={{marginBottom:8}}>
        <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Datum</div>
        <input type="date" value={dt} onChange={e=>setDt(e.target.value)}
          style={{...inp,width:"auto"}}/>
      </div>

      {/* Dagboek: ingeklapt tenzij je het nodig hebt */}
      <div style={{borderTop:`1px solid ${C.border}`,margin:"10px 0 8px",paddingTop:8}}>
        {!openJournal ? (
          <button onClick={()=>setOpenJournal(true)}
            style={{background:"transparent",color:C.textDim,border:`1px dashed ${C.border}`,
              borderRadius:5,padding:"6px 12px",fontSize:11,cursor:"pointer",width:"100%",
              textAlign:"left"}}>
            📓 + Beleggingsdagboek toevoegen <span style={{color:C.muted}}>(optioneel — waarom, gevaar, opmerking)</span>
          </button>
        ) : (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{color:C.accent,fontSize:11,fontWeight:700}}>📓 Beleggingsdagboek</span>
              <button onClick={()=>setOpenJournal(false)}
                style={{background:"transparent",color:C.textDim,border:"none",fontSize:11,
                  cursor:"pointer",padding:"2px 6px"}}>▲ inklappen</button>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{color:C.green,fontSize:11,marginBottom:3}}>Waarom kocht ik?</div>
              <textarea value={rsn} onChange={e=>setRsn(e.target.value)} rows={2}
                placeholder="Thesis: moat, koopsignaal, waardering..." style={ta()}/>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{color:C.orange,fontSize:11,marginBottom:3}}>Gevaar — wat kan de thesis breken?</div>
              <textarea value={rsk} onChange={e=>setRsk(e.target.value)} rows={2}
                placeholder="Het risico dat je erkent op dit moment..." style={ta({border:`1px solid ${C.orange}55`})}/>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Bijkomende opmerking</div>
              <textarea value={nt} onChange={e=>setNt(e.target.value)} rows={2}
                placeholder="Optioneel..." style={ta()}/>
            </div>
          </div>
        )}
      </div>

      <button onClick={submit} disabled={!canSave}
        style={{background:canSave?C.accent:C.panel2,color:canSave?C.bg:C.muted,border:"none",
          borderRadius:5,padding:"8px 16px",fontWeight:700,fontSize:12,
          cursor:canSave?"pointer":"not-allowed"}}>
        + Toevoegen
      </button>
      {!canSave&&(sh||pr)&&(
        <span style={{color:C.muted,fontSize:10,marginLeft:8}}>
          Vul aantal én prijs in (groter dan 0)
        </span>
      )}
    </div>
  );
}

// Eén positie met bewerkbaar dagboek. De bewerkknop klapt de drie velden open —

  const [rsk,setRsk] = useState(p.risk||"");

  const hasJournal = p.reason||p.risk||p.note;

  const saveEdit = ()=>{ update(p.id,{reason:rsn,risk:rsk,note:nt}); setEditing(false); };
  const cancelEdit = ()=>{ setRsn(p.reason||""); setRsk(p.risk||""); setNt(p.note||""); setEditing(false); };

  return (
    <div style={{background:C.bg,borderRadius:6,padding:10,marginBottom:6}}>

          <button onClick={()=>setEditing(true)}
            style={{background:"transparent",color:hasJournal?C.accent:C.textDim,
              border:`1px solid ${hasJournal?C.accent+"66":C.border}`,borderRadius:4,
              padding:"2px 8px",fontSize:10,cursor:"pointer",fontWeight:600}}>
            {hasJournal?"✎ Dagboek bewerken":"+ Dagboek toevoegen"}

      {editing?(
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
          <div style={{color:C.accent,fontSize:11,fontWeight:700,marginBottom:6}}>📓 Beleggingsdagboek</div>
          <div style={{marginBottom:6}}>
            <div style={{color:C.green,fontSize:11,marginBottom:3}}>Waarom kocht ik?</div>
            <textarea value={rsn} onChange={e=>setRsn(e.target.value)}
              placeholder="Thesis: moat, koopsignaal, waardering..." rows={2}
              style={{width:"100%",background:C.panel,border:`1px solid ${C.border}`,color:C.text,
                borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
          <div style={{marginBottom:6}}>
            <div style={{color:C.orange,fontSize:11,marginBottom:3}}>Gevaar — wat kan de thesis breken?</div>
            <textarea value={rsk} onChange={e=>setRsk(e.target.value)}
              placeholder="Het risico dat je erkent op dit moment..." rows={2}
              style={{width:"100%",background:C.panel,border:`1px solid ${C.orange}55`,color:C.text,
                borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{color:C.textDim,fontSize:11,marginBottom:3}}>Bijkomende opmerking</div>
            <textarea value={nt} onChange={e=>setNt(e.target.value)}
              placeholder="Optioneel..." rows={2}
              style={{width:"100%",background:C.panel,border:`1px solid ${C.border}`,color:C.text,
                borderRadius:5,padding:"6px 8px",fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={saveEdit}
              style={{background:C.accent,color:C.bg,border:"none",borderRadius:5,
                padding:"6px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Opslaan</button>
            <button onClick={cancelEdit}

          </div>

      ):(
        hasJournal&&(
          <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:6}}>
            {p.reason&&<div>
              <div style={{color:C.green,fontSize:10,fontWeight:700,marginBottom:2}}>Waarom gekocht</div>
              <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.reason}</div>

  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const TICKER_ORDER = ["WM","PLTR","CAT","ASML","ASMI","MU","GOOGL","AMZN","ORCL","KO","MC",
  "MSFT","AAPL","NVDA","V","MNST","AON","MELI","SHOP","NET","CRWV","SNAP","NKE","MSTR",
  "NFLX","DIS","BLK","BABA","MTLS","GAW","ADM","III","KPG","DIE","SOF","AIR","ALFEN","LOTB", "VOW", "EL", "META", "VST", "COPX", "ROBO",
  "ANET","HOOD","TSCO","ODFL","HWM","SNDK","NABTESCO","HARMONIC","KEYENCE","FANUC","YASKAWA","SOFTBANK","ROK","TER","ISRG","CGNX","NOVT",
  "LHX","MOGA","TDG","KTOS","RKLB","OPEN","SDGR","BNGO","PL",
  "IONQ","RGTI","QBTS","UBTECH","SYM","SERV","RR",
  "RDDT","NOW","GILD","DDOG","ARCC","ONON","ARCG"];

function App() {
  const [jsonData,  setJsonData]  = useState(null);
  const [trackData, setTrackData] = useState(null);
  const [loadState, setLoadState] = useState("loading"); // loading | ok | error | unconfigured
  const [selected,  setSelected]  = useState(null);
  const [view,      setView]      = useState("allocatie");
  const [search,    setSearch]    = useState("");   // zoekbalk screener
  const [sortBy,    setSortBy]    = useState("action");
  const [sortDir,   setSortDir]   = useState("desc");
  const [filterType,setFilter]    = useState("ALL");
  const { portfolio, add, update, remove, syncLink } = usePortfolio();
  const { notes, saveNote } = useNotes();

  // Cache-busting: voeg timestamp toe aan URL
  useEffect(()=>{
    if (SIGNALS_URL.includes("YOUR-USERNAME")) {
      setLoadState("unconfigured");
      return;
    }
    const t = Date.now();
    fetch(`${SIGNALS_URL}?t=${t}`)
      .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d=>{ setJsonData(d); setLoadState("ok"); })
      .catch(e=>{ console.error(e); setLoadState("error"); });
    // Trackrecord apart ophalen (zelfde map)
    const trackUrl = SIGNALS_URL.replace("signals.json","track_record.json");
    fetch(`${trackUrl}?t=${t}`)
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d) setTrackData(d); })
      .catch(()=>{});
  },[]);

  const stocks = jsonData?.stocks || {};
  const meta   = jsonData?.meta || {};
  const allocation = jsonData?.allocation || null;
  const weekly = jsonData?.weekly || null;
  const baggers = jsonData?.baggers || null;
  const market = jsonData?.market || null;
  const errors = jsonData?.errors || [];

  // Combineer live data met fallback fundamentals
  const getStockData = (ticker) => {
    const live = stocks[ticker];
    if (!live) return null;
    return {
      ...live,
      fund: live.fund || FALLBACK_FUND[ticker] || {},
    };
  };

  // Alle signalen over alle aandelen
  const allBuySignals  = TICKER_ORDER.flatMap(t=>(stocks[t]?.signals||[]).filter(s=>s.type==="BUY").map(s=>({...s,ticker:t})));
  const allSellSignals = TICKER_ORDER.flatMap(t=>(stocks[t]?.signals||[]).filter(s=>s.type==="SELL").map(s=>({...s,ticker:t})));
  const allAlerts      = TICKER_ORDER.flatMap(t=>(stocks[t]?.alerts||[]).map(a=>({...a,ticker:t})));

  const filteredSignals =
    filterType==="BUY"   ? allBuySignals :
    filterType==="SELL"  ? allSellSignals :
    filterType==="WATCH" ? allAlerts :
    [...allBuySignals,...allSellSignals,...allAlerts];

  // Group by ticker
  const grouped = {};
  filteredSignals.forEach(s=>{
    if(!grouped[s.ticker]) grouped[s.ticker]={ticker:s.ticker,items:[]};
    grouped[s.ticker].items.push(s);
  });

  const sorted = [...TICKER_ORDER]
    .filter(t=>stocks[t])
    .filter(t=>{
      // Zoekfilter: match op ticker of bedrijfsnaam (hoofdletterongevoelig)
      if(!search.trim()) return true;
      const q = search.trim().toLowerCase();
      const nm = (STOCK_NAMES[t]||"").toLowerCase();
      return t.toLowerCase().includes(q) || nm.includes(q);
    })
    .sort((a,b)=>{
      const valScore = t => {
        const c = stocks[t]?.valuation?.verdictColor;
        return c==="green"?3:c==="neutral"?2:c==="orange"?1:c==="red"?0:-1;
      };
      // Actie-rang: groepeert op categorie (Koop → Verkoop → Caution → Neutraal),
      // binnen elke groep sterkste eerst. Zo staan actievragers bovenaan.
      const actionRank = t => {
        const o = stocks[t]?.overall || "NEUTRAAL";
        const map = {
          "STERK KOOP": 100, "KOOP": 90, "LICHT KOOP": 80,
          "STERK VERKOOP": 70, "VERKOOP": 60, "LICHT VERKOOP": 50,
          "CAUTION (overextended)": 40,
          "NEUTRAAL": 10,
        };
        return map[o] ?? 10;
      };
      const v = t =>
        sortBy==="action"     ? actionRank(t) :
        sortBy==="composite"  ? (stocks[t]?.scores?.composite ?? -1) :
        sortBy==="timing"     ? (stocks[t]?.scores?.timing ?? -1) :
        sortBy==="opportunity"? (stocks[t]?.scores?.opportunity ?? -1) :
        sortBy==="entry"      ? (stocks[t]?.timing?.entryScore ?? -1) :
        sortBy==="trend"      ? (stocks[t]?.timing?.trendScore ?? -1) :
        sortBy==="buyWeight"  ? (stocks[t]?.buyWeight||0) :
        sortBy==="sellWeight" ? (stocks[t]?.sellWeight||0) :
        sortBy==="valuation"  ? valScore(t) :
        sortBy==="acceleration" ? (stocks[t]?.scores?.acceleration ?? -1) :
        sortBy==="rsi"        ? (stocks[t]?.indicators?.rsiDaily||50) :
        sortBy==="alerts"     ? (stocks[t]?.alerts?.length||0) :
                                (bScore(stocks[t]?.fund||FALLBACK_FUND[t]||{}) ?? -1);
      // Tiebreak binnen actie-groep: hoogste composiet eerst
      const primary = sortDir==="desc"?v(b)-v(a):v(a)-v(b);
      if (sortBy==="action" && primary===0) {
        return (stocks[b]?.scores?.composite ?? 0) - (stocks[a]?.scores?.composite ?? 0);
      }
      return primary;
    });

  // Elke positie heeft een uniek id, dus remove()/update() raken altijd de JUISTE
  // positie -- ook al filtert portItems posities zonder koersdata weg.
  const portItems = portfolio.map(p=>{
    const last = stocks[p.ticker]?.indicators?.last;
    if (!last) return null;
    return{...p,last,cv:last*p.shares,cb:p.buyPrice*p.shares,pnl:(last-p.buyPrice)*p.shares};
  }).filter(Boolean);
  const tv2=portItems.reduce((a,p)=>a+p.cv,0);
  const tc2=portItems.reduce((a,p)=>a+p.cb,0);

  const SBtn=({k,l})=>(
    <button onClick={()=>{if(sortBy===k)setSortDir(d=>d==="desc"?"asc":"desc");else{setSortBy(k);setSortDir("desc")}}}
      style={{background:sortBy===k?C.accent:"none",color:sortBy===k?C.bg:C.textDim,
        border:`1px solid ${sortBy===k?C.accent:C.border}`,borderRadius:4,
        padding:"3px 9px",fontSize:10,cursor:"pointer",fontWeight:sortBy===k?700:400}}>
      {l}{sortBy===k?(sortDir==="desc"?" ↓":" ↑"):""}
    </button>
  );

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Inter',system-ui,sans-serif",color:C.text}}>

      {/* NAV */}
      <div style={{borderBottom:`1px solid ${C.border}`,padding:"12px 18px",
        display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <span style={{color:C.accent,fontWeight:900,fontSize:18,letterSpacing:2}}>BUFFETT+</span>
          <span style={{color:C.textDim,fontSize:11,marginLeft:10}}>Kwaliteit × Timing</span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["allocatie","🎯 Maandpick"],["schatkamer","💰 Schatkamer"],["koopkans","💎 Koopkans"],["baggers","🚀 Baggers"],["momentum","🔄 Momentum"],["signalen","🚦 Signalen"],["screener","📊 Screener"],["sectoren","🗂 Sectoren"],["trackrecord","📈 Trackrecord"],["portfolio","💼 Portfolio"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{
              background:view===v?C.accent:"none",color:view===v?C.bg:C.textDim,
              border:`1px solid ${view===v?C.accent:C.border}`,borderRadius:5,
              padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:view===v?700:400}}>{l}</button>
          ))}
        </div>
      </div>

      {/* STATUS BALK */}
      <div style={{padding:"8px 18px",borderBottom:`1px solid ${C.border}`,
        display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
        <div style={{fontSize:11}}>
          {loadState==="loading"&&<span style={{color:C.orange}}>⟳ Data ophalen van GitHub Pages…</span>}
          {loadState==="ok"&&(
            <span style={{color:C.green}}>
              ✓ Laatste update: {meta.generatedAtHuman||"onbekend"}
              {meta.isFriday&&" · 📅 Vrijdag: weekly signalen geëvalueerd"}
            </span>
          )}
          {loadState==="error"&&(
            <span style={{color:C.red}}>
              ✗ Kan data niet laden — controleer of GitHub Actions al gedraaid heeft
            </span>
          )}
          {loadState==="unconfigured"&&(
            <span style={{color:C.orange}}>
              ⚙ Configuratie nodig: vervang YOUR-USERNAME in de app met je GitHub gebruikersnaam
            </span>
          )}
        </div>

                  </div>

              </>
            );

                                  borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>★ {comp>=0?comp:"—"}</span>}
                            {d?.scores?.accelLabel&&d.scores.accelLabel!=="onbekend"&&d.scores.accelLabel!=="Stabiel"&&(
                              <span style={{color:d.scores.accelColor==="green"?C.green:d.scores.accelColor==="orange"?C.orange:C.textDim,
                                fontSize:9,fontWeight:700}}>
                                {d.scores.accelColor==="green"?"🚀":"🐢"}{d.scores.accelValue>0?"+":""}{d.scores.accelValue}pp</span>
                            )}
                            {d?.isETF&&<span title="ETF - een mandje aandelen. Geen kwaliteitsscore mogelijk; alleen timing telt."
                              style={{background:C.panel2,color:C.accent,border:`1px solid ${C.accent}66`,
                              borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:700}}>ETF</span>}
                            {d?.isBagger&&!d?.isETF&&<span style={{color:C.textDim,fontSize:9}}>bagger</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}

      {/* BAGGERS VIEW */}
      {view==="baggers"&&(
        <div style={{padding:"14px 16px"}}>
          <BaggerTrack baggers={baggers} onSelect={setSelected}/>
        </div>
      )}

      {/* TRACKRECORD VIEW */}
      {view==="trackrecord"&&(
        <div style={{padding:"14px 16px"}}>
          <PurchaseMirror portfolio={portfolio} track={trackData} stocks={stocks}/>
          <ModelDiagnostics diag={trackData?.diagnostics} version={trackData?.modelVersion}/>
          <TrackRecord track={trackData}/>
        </div>
      )}

      {/* PORTFOLIO VIEW */}
      {view==="portfolio"&&(
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[
              {l:"Totale waarde",v:`$${tv2.toFixed(0)}`,c:C.accent},
              {l:"Kostprijs",    v:`$${tc2.toFixed(0)}`,c:C.text},
              {l:"P&L",         v:`${tv2-tc2>=0?"+":""}$${(tv2-tc2).toFixed(0)}`,c:tv2-tc2>=0?C.green:C.red},
            ].map(x=>(
              <div key={x.l} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{color:C.textDim,fontSize:11}}>{x.l}</div>
                <div style={{color:x.c,fontSize:20,fontWeight:800,marginTop:2}}>{x.v}</div>
              </div>
            ))}
          </div>
          {portfolio.some(p=>(stocks[p.ticker]?.currency||"$")!=="$")&&(
            <div style={{color:C.orange,fontSize:10,marginBottom:12}}>
              ⚠ Posities in meerdere valuta's — de totalen hierboven tellen bedragen op zonder omrekening.
            </div>
          )}
          {/* Sync-knop: verschijnt zodra er IETS te syncen valt -- posities OF notities.
              Voorheen stond hij alleen bij posities (portfolio.length>0), waardoor iemand
              met enkel watchlist-notities niet kon syncen, terwijl de sync die notities
              wel meestuurt. De knoptekst noemt nu allebei, zodat duidelijk is dat je
              notities meegaan. */}
          {(portfolio.length>0 || Object.keys(notes).length>0)&&(
            <div style={{marginBottom:16}}>
              <button onClick={syncLink} style={{background:"none",color:C.accent,border:`1px solid ${C.accent}`,
                borderRadius:6,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                📲 Sync naar ander apparaat
              </button>
              <div style={{color:C.muted,fontSize:10,marginTop:6,lineHeight:1.5}}>
                Stuurt {portfolio.length} positie(s){Object.keys(notes).length>0?` + ${Object.keys(notes).length} notitie(s)`:""} naar je andere apparaat.
                De link <b style={{color:C.textDim}}>voegt samen</b> — niets wordt overschreven, de nieuwste versie wint.
              </div>
            </div>
          )}
          {portItems.length===0
            ?<div style={{textAlign:"center",color:C.textDim,padding:40}}>Nog geen posities. Klik een aandeel → tab "Portfolio".</div>
            :<div style={{display:"grid",gap:8}}>
              {portItems.map(p=>{
                const data=getStockData(p.ticker);
                const hasJournal = p.reason||p.risk||p.note;
                return(
                  <div key={p.id} style={{background:C.panel,border:`1px solid ${C.border}`,
                    borderRadius:8,padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{color:C.accent,fontWeight:700}}>{p.ticker} <span style={{color:C.textDim,fontWeight:400,fontSize:11}}>{STOCK_NAMES[p.ticker]}</span></div>
                        <div style={{color:C.textDim,fontSize:11}}>{p.shares} × ${p.buyPrice} · {p.date}</div>
                        <div style={{color:C.textDim,fontSize:11}}>Huidig: ${p.last?.toFixed(2)||"—"}</div>
                        {data?.overall&&<div style={{marginTop:4}}><OverallBadge signal={data.overall}/></div>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:p.pnl>=0?C.green:C.red,fontWeight:700,fontSize:16}}>{p.pnl>=0?"+":""}${p.pnl.toFixed(0)}</div>
                        <div style={{color:p.pnl>=0?C.green:C.red,fontSize:12}}>{((p.pnl/p.cb)*100).toFixed(1)}%</div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setSelected(p.ticker)}
                          style={{background:"none",border:`1px solid ${hasJournal?C.accent+"66":C.border}`,
                            color:hasJournal?C.accent:C.textDim,borderRadius:4,padding:"3px 8px",
                            fontSize:10,cursor:"pointer",fontWeight:600}}>
                          {hasJournal?"✎ Dagboek":"+ Dagboek"}
                        </button>
                        <button onClick={()=>remove(p.id)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>Verwijder</button>
                      </div>
                    </div>
                    {hasJournal&&(
                      <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:6}}>
                        {p.reason&&<div>
                          <div style={{color:C.green,fontSize:10,fontWeight:700,marginBottom:2}}>Waarom gekocht</div>
                          <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.reason}</div>
                        </div>}
                        {p.risk&&<div>
                          <div style={{color:C.orange,fontSize:10,fontWeight:700,marginBottom:2}}>⚠ Gevaar</div>
                          <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.risk}</div>
                        </div>}
                        {p.note&&<div>
                          <div style={{color:C.textDim,fontSize:10,fontWeight:700,marginBottom:2}}>Opmerking</div>
                          <div style={{color:C.text,fontSize:11,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.note}</div>
                        </div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          }
        </div>
      )}

      {selected&&(
        <Detail ticker={selected} data={getStockData(selected)}
          onClose={()=>setSelected(null)} portfolio={portfolio} add={add} update={update}
          notes={notes} saveNote={saveNote}/>
      )}

      <div style={{borderTop:`1px solid ${C.border}`,padding:"8px 16px",textAlign:"center",color:C.muted,fontSize:10}}>
        Technische data via yfinance · Fundamentals jun 2026 · Signaalgewichten zijn indicatief · Geen financieel advies
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
(function(){
  try {
    var src = document.getElementById("jsx-source").textContent;
    var out = Babel.transform(src, { presets: ["react"] }).code;
    var s = document.createElement("script");
    s.textContent = out;
    document.body.appendChild(s);
  } catch (e) {
    var msg = (e && e.message) ? e.message : String(e);
    var stack = (e && e.stack) ? e.stack : "";
    document.body.innerHTML = "<pre style=\"color:#f88;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:12px;\">BABEL FOUT:\n" + msg + "\n\n" + stack + "</pre>";
    console.error("Babel transform faalde:", e);
  }
})();
</script>
</body>
</html>
