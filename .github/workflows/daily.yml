name: Dagelijkse Signaalanalyse

on:
  schedule:
    # Elke werkdag om 07:30 UTC (dekt winter- en zomertijd voor ~08:00 Brussels)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:        # Handmatig starten via GitHub website

# Minimale permissies (security: alleen wat nodig is)
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    # De notificatie-secret naar env tillen. Nodig omdat `secrets` niet gebruikt mag
    # worden in een step-level `if`, maar `env` wel. Is NOTIFY_EMAIL niet ingesteld,
    # dan is deze leeg en wordt de mailstap netjes overgeslagen.
    env:
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4
        with:
          # Standaard haalt checkout maar EEN commit op (shallow clone). Dat is sneller,
          # maar `git pull --rebase` heeft historie nodig om een gemeenschappelijke basis
          # te vinden. Zonder dit faalt de rebase-retry hieronder.
          fetch-depth: 0

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Signaalanalyse uitvoeren
        env:
          # Optioneel: voor echte historische P/E. Zonder key valt het systeem terug op PEG.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python analyze.py

      - name: Resultaten committen
        run: |
          git config user.name  "Buffett+ Bot"
          git config user.email "bot@buffett-dashboard"

          # Elk bestand APART toevoegen, met `|| true` erachter. Reden: fills.jsonl
          # bestaat pas zodra je een positie logt. Stond het in een gecombineerde
          # `git add`-regel, dan kon de hele stap falen op dat ene ontbrekende bestand
          # -- en werd er NIETS gecommit, ook universe.jsonl niet.
          for f in signals.json timeline.json weekly.json track_record.json \
                   universe.jsonl fills.jsonl; do
            if [ -f "$f" ]; then
              git add "$f" || true
              echo "  toegevoegd: $f"
            else
              echo "  (nog niet aanwezig: $f)"
            fi
          done
          git add history/ || true

          echo "--- Wat staat er klaar om te committen? ---"
          git status --short

          git diff --staged --quiet && { echo "Niets gewijzigd."; exit 0; }
          git commit -m "Update $(date '+%Y-%m-%d %H:%M UTC')"

          # PUSHEN MET REBASE-RETRY.
          #
          # Waarom dit nodig is: de workflow haalt de repo op bij de START. Upload jij
          # tijdens de run een bestand via de GitHub-website, dan loopt `main` verder
          # terwijl de bot nog draait. De push wordt dan geweigerd:
          #     ! [rejected]  main -> main (fetch first)
          # Dat is geen fout in de analyse -- die is dan al geslaagd en gecommit. Het is
          # een race tussen jou en de bot.
          #
          # `--rebase` zet de bot-commit BOVENOP wat er intussen is bijgekomen, in plaats
          # van te proberen het te overschrijven. `--autostash` is niet nodig (alles is
          # al gecommit), maar staat er voor de zekerheid.
          #
          # Drie pogingen, want in theorie kan er tussen de pull en de push opnieuw iets
          # binnenkomen. In de praktijk slaagt de eerste bijna altijd.
          for poging in 1 2 3; do
            if git push; then
              echo "Push geslaagd (poging $poging)."
              exit 0
            fi
            echo "Push geweigerd -- remote is verder gelopen. Ophalen en opnieuw (poging $poging/3)..."
            git pull --rebase --autostash origin main || {
              echo "Rebase mislukt. Handmatig ingrijpen nodig."
              exit 1
            }
          done
          echo "Push na 3 pogingen niet gelukt."
          exit 1

      - name: E-mail bij fout
        # Alleen mailen als er ECHT een adres is ingesteld. Zonder deze check faalt de
        # mailstap zelf ("At least one of 'to' must be specified") en zie je TWEE fouten
        # in Actions terwijl er maar EEN echt probleem is -- dat leidt af van de oorzaak.
        #
        # Let op: GitHub Actions staat `secrets` NIET toe in een step-level `if`.
        # De secret wordt daarom eerst naar `env` getild (zie hierboven), en daarop
        # testen we hier.
        if: failure() && env.NOTIFY_EMAIL != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "BUFFETT+ Analyse gefaald"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Buffett+ Dashboard
          body: |
            De dagelijkse analyse is gefaald.
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
