name: Dagelijkse Signaalanalyse

on:
  schedule:
    # Elke werkdag om 07:30 UTC (dekt winter- en zomertijd voor ~08:00 Brussels)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:        # Handmatig starten via GitHub website

# Minimale permissies (security: alleen wat nodig is)
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Signaalanalyse uitvoeren
        env:
          # Optioneel: voor echte historische P/E. Zonder key valt het systeem terug op PEG.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python analyze.py

      - name: Resultaten committen
        run: |
          git config user.name  "Buffett+ Bot"
          git config user.email "bot@buffett-dashboard"

          # Elk bestand APART toevoegen, met `|| true` erachter. Reden: fills.jsonl
          # bestaat pas zodra je een positie logt. Stond het in een gecombineerde
          # `git add`-regel, dan kon de hele stap falen op dat ene ontbrekende bestand
          # -- en werd er NIETS gecommit, ook universe.jsonl niet.
          for f in signals.json timeline.json weekly.json track_record.json \
                   universe.jsonl fills.jsonl; do
            if [ -f "$f" ]; then
              git add "$f" || true
              echo "  toegevoegd: $f"
            else
              echo "  (nog niet aanwezig: $f)"
            fi
          done
          git add history/ || true

          echo "--- Wat staat er klaar om te committen? ---"
          git status --short

          git diff --staged --quiet || git commit -m "Update $(date '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: E-mail bij fout
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "BUFFETT+ Analyse gefaald"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Buffett+ Dashboard
          body: |
            De dagelijkse analyse is gefaald.
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
